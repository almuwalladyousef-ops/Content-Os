<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Content OS</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
:root {
  --bg0:#eef1ec;
  --bg1:#fbfaf6;
  --bg2:#ffffff;
  --bg3:#f2f4ef;
  --bg4:#e6ebe3;
  --ink:#17201c;
  --text1:#17201c;
  --text2:#5b665f;
  --text3:#8a948d;
  --border:#d9ded6;
  --border2:#c5cdc2;
  --accent:#0f766e;
  --accent-strong:#0b4f4a;
  --accent-dim:#e3f1ee;
  --accent-glow:rgba(15,118,110,.18);
  --green:#168047;
  --red:#c24135;
  --amber:#b7791f;
  --panel-shadow:0 18px 42px rgba(42,49,44,.10);
  --card-shadow:0 8px 22px rgba(42,49,44,.08);
  --r:8px;
}
html,body { height:100%; overflow:hidden; }
body {
  background:
    linear-gradient(180deg,rgba(251,250,246,.62),rgba(238,241,236,.94)),
    repeating-linear-gradient(90deg,rgba(23,32,28,.035) 0 1px,transparent 1px 88px);
  color:var(--text1);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;
}
button,input,select,textarea { font:inherit; }
button { color:inherit; }

#landing {
  display:grid;
  grid-template-columns:minmax(260px,420px) minmax(280px,520px);
  grid-template-areas:
    "mark panel"
    "title panel"
    "sub panel";
  grid-template-rows:auto auto auto;
  align-items:center;
  align-content:center;
  justify-content:center;
  min-height:100vh;
  column-gap:48px;
  row-gap:18px;
  padding:42px;
  background:
    linear-gradient(115deg,rgba(15,118,110,.10),transparent 34%),
    linear-gradient(0deg,var(--bg0),var(--bg1));
}
.landing-icon {
  grid-area:mark;
  align-self:end;
  width:64px;
  height:64px;
  border-radius:8px;
  background:#17201c;
  color:#f8f3df;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  box-shadow:12px 12px 0 #d8c65f;
}
#landing h1 {
  grid-area:title;
  margin-top:18px;
  font-size:clamp(38px,5vw,72px);
  line-height:.94;
  font-weight:850;
  color:var(--ink);
  max-width:420px;
}
.landing-sub {
  grid-area:sub;
  align-self:start;
  margin-top:8px;
  color:var(--text2);
  font-size:15px;
  line-height:1.7;
  max-width:340px;
}
#landing-body {
  grid-area:panel;
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:8px;
  box-shadow:var(--panel-shadow);
  padding:24px;
  min-height:190px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  gap:14px;
}
#landing-body p {
  color:var(--text2) !important;
  font-size:13px !important;
  line-height:1.65 !important;
}
.open-btn {
  align-self:flex-start;
  background:var(--ink);
  border:1px solid var(--ink);
  color:#fffdf6;
  border-radius:6px;
  padding:11px 18px;
  font-size:13px;
  font-weight:800;
  cursor:pointer;
  box-shadow:0 8px 18px rgba(23,32,28,.18);
  transition:transform .14s,box-shadow .14s,background .14s;
}
.open-btn:hover {
  background:var(--accent-strong);
  transform:translateY(-1px);
  box-shadow:0 12px 26px rgba(15,118,110,.20);
}
.hint { color:var(--text3); font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.08em; }
.srv-msg { color:var(--text2); text-align:left; max-width:360px; line-height:1.8; }

#main { display:none; flex-direction:column; height:100vh; }
#main.visible { display:flex; }
.topbar {
  display:flex;
  align-items:center;
  gap:10px;
  min-height:58px;
  padding:10px 18px;
  background:rgba(251,250,246,.92);
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  flex-shrink:0;
}
.logo {
  display:flex;
  align-items:center;
  gap:9px;
  font-size:13px;
  font-weight:850;
  color:var(--ink);
  text-transform:uppercase;
  letter-spacing:.08em;
}
.logo::before {
  content:"";
  width:24px;
  height:24px;
  border-radius:6px;
  background:linear-gradient(135deg,var(--ink) 0 54%,#d8c65f 54% 100%);
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.22);
}
.chip {
  background:var(--bg3);
  border:1px solid var(--border);
  border-radius:999px;
  padding:4px 10px;
  font-size:11px;
  font-weight:700;
  color:var(--text2);
}
.online {
  color:var(--green);
  font-size:11px;
  font-weight:800;
  display:flex;
  align-items:center;
  gap:6px;
}
.online::before {
  content:"";
  width:7px;
  height:7px;
  border-radius:50%;
  background:var(--green);
  box-shadow:0 0 0 4px rgba(22,128,71,.12);
}
#fcount {
  color:var(--text3) !important;
  font-weight:700;
  margin-left:2px;
}
.tb-right {
  margin-left:auto;
  display:flex;
  align-items:center;
  gap:8px;
}
.tb-btn {
  background:var(--bg2);
  border:1px solid var(--border2);
  color:var(--text2);
  border-radius:6px;
  min-height:32px;
  padding:0 12px;
  font-size:12px;
  font-weight:800;
  cursor:pointer;
  transition:background .12s,border-color .12s,transform .12s,color .12s;
}
.tb-btn:hover {
  color:var(--ink);
  border-color:#9aa59d;
  background:#fffdf8;
  transform:translateY(-1px);
}
.tb-btn-new {
  background:var(--accent);
  border-color:var(--accent);
  color:#fff;
  box-shadow:0 10px 22px rgba(15,118,110,.18);
}
.tb-btn-new:hover { background:var(--accent-strong); color:#fff; }

.view-tabs {
  display:flex;
  align-items:center;
  gap:6px;
  padding:10px 18px 0;
  background:var(--bg1);
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.vtab {
  background:transparent;
  border:1px solid transparent;
  border-bottom:none;
  color:var(--text3);
  font-size:12px;
  font-weight:850;
  padding:10px 16px 12px;
  border-radius:8px 8px 0 0;
  cursor:pointer;
  transition:background .12s,color .12s,border-color .12s;
  position:relative;
}
.vtab:hover { color:var(--text1); background:rgba(23,32,28,.04); }
.vtab.on {
  color:var(--ink);
  background:var(--bg0);
  border-color:var(--border);
}
.vtab.on::after {
  content:"";
  position:absolute;
  left:12px;
  right:12px;
  bottom:-1px;
  height:2px;
  background:var(--accent);
}
.filterbar {
  display:flex;
  align-items:center;
  gap:7px;
  padding:12px 18px;
  background:var(--bg0);
  border-bottom:1px solid var(--border);
  flex-shrink:0;
  overflow-x:auto;
}
.f-label {
  color:var(--text3);
  flex-shrink:0;
  font-size:10px;
  font-weight:850;
  letter-spacing:.10em;
  text-transform:uppercase;
}
.pill {
  border:1px solid var(--border);
  background:rgba(255,255,255,.68);
  color:var(--text2);
  border-radius:999px;
  min-height:28px;
  padding:0 12px;
  font-size:11px;
  font-weight:800;
  cursor:pointer;
  white-space:nowrap;
  transition:background .12s,border-color .12s,color .12s,box-shadow .12s;
  flex-shrink:0;
}
.pill:hover { color:var(--ink); border-color:var(--border2); background:#fff; }
.pill.on {
  background:var(--ink);
  border-color:var(--ink);
  color:#fffdf7;
  box-shadow:0 8px 16px rgba(23,32,28,.12);
}
.pill[data-account="traceback"].on    { background:#7f4f24; border-color:#7f4f24; }
.pill[data-account="personal-ai"].on  { background:#2d6f88; border-color:#2d6f88; }
.pill[data-account="motivational"].on { background:#168047; border-color:#168047; }
.sep {
  width:1px;
  height:22px;
  background:var(--border);
  margin:0 5px;
  flex-shrink:0;
}
.search-wrap { margin-left:auto; flex-shrink:0; }
.search-input {
  background:#fff;
  border:1px solid var(--border);
  color:var(--text1);
  border-radius:6px;
  min-height:32px;
  padding:0 12px;
  font-size:12px;
  width:210px;
  outline:none;
  transition:border-color .15s,box-shadow .15s;
}
.search-input:focus {
  border-color:var(--accent);
  box-shadow:0 0 0 3px var(--accent-glow);
}
.search-input::placeholder { color:var(--text3); }

.body { display:flex; flex:1; min-height:0; overflow:hidden; position:relative; }
.kanban-wrap {
  flex:1;
  overflow-x:auto;
  overflow-y:hidden;
  padding:18px;
  cursor:grab;
}
.kanban-wrap:active { cursor:grabbing; }
.kanban {
  display:grid;
  grid-auto-flow:column;
  grid-auto-columns:minmax(220px,1fr);
  gap:14px;
  height:100%;
  min-width:max-content;
}
.col {
  background:rgba(255,255,255,.50);
  border:1px solid rgba(217,222,214,.85);
  border-radius:8px;
  display:flex;
  flex-direction:column;
  min-width:220px;
  overflow:hidden;
  transition:background .15s,border-color .15s,box-shadow .15s;
}
.col.drag-over {
  background:#e3f1ee;
  border-color:var(--accent);
  box-shadow:inset 0 0 0 1px var(--accent);
}
.col-head {
  min-height:50px;
  padding:13px 13px 10px;
  display:flex;
  align-items:center;
  gap:8px;
  flex-shrink:0;
  border-bottom:1px solid rgba(217,222,214,.7);
}
.col-dot {
  width:8px;
  height:8px;
  border-radius:50%;
  flex-shrink:0;
}
.col-name {
  color:var(--text2);
  flex:1;
  font-size:11px;
  font-weight:850;
  letter-spacing:.08em;
  text-transform:uppercase;
}
.col-n {
  background:var(--bg3);
  border:1px solid var(--border);
  border-radius:999px;
  color:var(--text3);
  min-width:26px;
  padding:2px 7px;
  text-align:center;
  font-size:11px;
  font-weight:800;
  font-variant-numeric:tabular-nums;
}
.cards {
  flex:1;
  overflow-y:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
  gap:8px;
}
.drop-hint {
  margin:0 10px 10px;
  padding:9px;
  border:1px dashed var(--border2);
  border-radius:6px;
  text-align:center;
  font-size:11px;
  font-weight:800;
  color:var(--text3);
  background:rgba(255,255,255,.42);
  flex-shrink:0;
  transition:color .15s,border-color .15s,background .15s;
  cursor:default;
}
.col.drag-over .drop-hint {
  color:var(--accent-strong);
  border-color:var(--accent);
  background:#fff;
}

.research-wrap {
  flex:1;
  overflow-x:auto;
  overflow-y:hidden;
  padding:18px;
  display:flex;
  gap:14px;
  align-items:stretch;
  cursor:grab;
}
.research-wrap:active { cursor:grabbing; }
.rsect {
  width:310px;
  flex-shrink:0;
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:8px;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  box-shadow:var(--card-shadow);
  transition:border-color .15s,box-shadow .15s;
}
.rsect:hover { border-color:var(--border2); box-shadow:var(--panel-shadow); }
.rsect-head {
  min-height:52px;
  padding:13px 14px;
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  gap:8px;
  flex-shrink:0;
  background:#fffdf8;
}
.rsect-icon { font-size:15px; }
.rsect-title {
  color:var(--ink);
  font-size:11px;
  font-weight:850;
  text-transform:uppercase;
  letter-spacing:.08em;
}
.rsect-n {
  background:var(--bg3);
  border:1px solid var(--border);
  border-radius:999px;
  padding:2px 8px;
  font-size:10px;
  font-weight:850;
  color:var(--text3);
  margin-left:auto;
  font-variant-numeric:tabular-nums;
}
.rsect-breaking { border-color:#efc8bf; }
.rsect-breaking .rsect-head { background:#fff3ef; border-bottom-color:#efc8bf; }
.rsect-breaking .rsect-title { color:#a83227; }
.rcards {
  flex:1;
  overflow-y:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
  gap:8px;
}
.rcard,.card {
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:8px;
  cursor:pointer;
  user-select:none;
  transition:border-color .12s,background .12s,box-shadow .12s,transform .12s;
}
.card { padding:12px; }
.rcard {
  padding:12px;
  display:flex;
  flex-direction:column;
  gap:10px;
}
.card:hover,.rcard:hover {
  border-color:#aab5ad;
  background:#fffefb;
  box-shadow:var(--card-shadow);
  transform:translateY(-1px);
}
.card.on,.rcard.on {
  border-color:var(--accent);
  background:var(--accent-dim);
  box-shadow:0 0 0 2px var(--accent-glow);
}
.card.dragging { opacity:.38; transform:scale(.98); }
.card-title,.rcard-title {
  color:var(--text1);
  font-size:12px;
  font-weight:750;
  line-height:1.45;
  overflow-wrap:anywhere;
}
.card-title { margin-bottom:9px; }
.rcard-body { min-width:0; }
.rcard-sub {
  margin-top:4px;
  color:var(--text3);
  font-size:10px;
  line-height:1.45;
  overflow-wrap:anywhere;
}
.rcard-actions {
  display:flex;
  gap:7px;
  align-items:center;
  justify-content:space-between;
}
.r-script-btn {
  background:var(--ink);
  color:#fff;
  border:none;
  border-radius:6px;
  min-height:28px;
  padding:0 10px;
  font-size:10px;
  font-weight:850;
  cursor:pointer;
  white-space:nowrap;
  transition:background .12s,transform .12s;
}
.r-script-btn:hover { background:var(--accent-strong); transform:translateY(-1px); }
.r-urgent {
  background:#c24135;
  color:#fff;
  border-radius:999px;
  padding:3px 8px;
  font-size:9px;
  font-weight:900;
  text-transform:uppercase;
  letter-spacing:.07em;
}
.tags {
  display:flex;
  gap:5px;
  flex-wrap:wrap;
}
.tag {
  border:1px solid transparent;
  border-radius:999px;
  font-size:9px;
  font-weight:850;
  padding:3px 7px;
  text-transform:uppercase;
  letter-spacing:.05em;
}
.tag-traceback    { background:#fbefe4; color:#7f4f24; border-color:#ead2ba; }
.tag-personal-ai  { background:#e5f2f6; color:#2d6f88; border-color:#c4dfe7; }
.tag-motivational { background:#e4f2e9; color:#168047; border-color:#c6dfce; }
.tag-fmt { background:var(--bg3); color:var(--text2); border-color:var(--border); }
.tag-p  { background:#fff4cc; color:#8a5c00; border-color:#ead37e; }

.insp {
  display:none;
  position:fixed;
  top:50%;
  left:50%;
  width:min(980px,calc(100vw - 48px));
  height:min(760px,calc(100vh - 48px));
  transform:translate(-50%,-50%);
  z-index:90;
  background:rgba(17,26,24,.96);
  border:1px solid var(--border);
  border-radius:8px;
  overflow:hidden;
  flex-direction:column;
  box-shadow:0 24px 70px rgba(0,0,0,.42);
}
.insp.open {
  display:flex;
}
.insp-head {
  min-height:54px;
  padding:14px 18px;
  border-bottom:1px solid var(--border);
  color:var(--ink);
  flex-shrink:0;
  display:flex;
  align-items:center;
  justify-content:space-between;
  white-space:nowrap;
  font-size:11px;
  font-weight:900;
  letter-spacing:.10em;
  text-transform:uppercase;
  cursor:move;
  user-select:none;
}
.insp-toggle {
  width:28px;
  height:28px;
  background:var(--bg3);
  border:1px solid var(--border);
  border-radius:6px;
  color:var(--text2);
  font-size:18px;
  cursor:pointer;
  line-height:1;
  flex-shrink:0;
  transition:color .12s,background .12s,border-color .12s;
}
.insp-toggle:hover {
  color:var(--ink);
  background:#fff;
  border-color:var(--border2);
}
.insp-body { flex:1; overflow-y:auto; padding:18px; }
.empty {
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100%;
  color:var(--text3);
  font-size:12px;
  text-align:center;
  gap:10px;
  line-height:1.5;
}
.empty-icon {
  width:38px;
  height:38px;
  border-radius:8px;
  background:var(--bg3);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:19px;
  opacity:.9;
}
.ftb {
  display:flex;
  align-items:center;
  gap:12px;
  padding:12px;
  border-radius:8px;
  margin-bottom:16px;
  border:1px solid;
}
.ftb-ico { font-size:19px; }
.ftb-type {
  font-size:11px;
  font-weight:900;
  letter-spacing:.07em;
}
.ftb-sub {
  font-size:10px;
  opacity:.72;
  margin-top:3px;
  overflow-wrap:anywhere;
}
.isect { margin-bottom:16px; }
.ilbl {
  color:var(--text3);
  font-size:10px;
  font-weight:900;
  text-transform:uppercase;
  letter-spacing:.10em;
  margin-bottom:7px;
}
.ival {
  color:var(--text1);
  font-size:13px;
  font-weight:700;
  line-height:1.5;
  overflow-wrap:anywhere;
}
.meta-row {
  display:flex;
  justify-content:space-between;
  align-items:baseline;
  gap:12px;
  margin-bottom:6px;
  border-bottom:1px solid rgba(217,222,214,.65);
  padding-bottom:6px;
}
.meta-k {
  color:var(--text3);
  font-size:10px;
  font-weight:850;
  text-transform:uppercase;
  letter-spacing:.06em;
}
.meta-v {
  color:var(--text2);
  font-size:11px;
  font-weight:750;
  text-align:right;
  overflow-wrap:anywhere;
}
.date-field { display:flex; align-items:center; gap:7px; }
.date-input,.mini-select,.form-input,.form-select {
  background:#fff;
  border:1px solid var(--border);
  color:var(--text1);
  border-radius:6px;
  outline:none;
  transition:border-color .15s,box-shadow .15s;
}
.date-input {
  flex:1;
  min-width:0;
  min-height:34px;
  padding:0 10px;
  font-size:12px;
}
.date-input:focus,.mini-select:focus,.form-input:focus,.form-select:focus {
  border-color:var(--accent);
  box-shadow:0 0 0 3px var(--accent-glow);
}
.date-save {
  background:var(--ink);
  color:#fff;
  border:none;
  border-radius:6px;
  min-height:34px;
  padding:0 12px;
  font-size:11px;
  font-weight:850;
  cursor:pointer;
  transition:background .12s;
}
.date-save:hover { background:var(--accent-strong); }
.nxt {
  border-radius:8px;
  padding:12px;
  margin-bottom:16px;
  border-left:4px solid;
}
.nxt-lbl {
  font-size:10px;
  font-weight:900;
  text-transform:uppercase;
  letter-spacing:.09em;
  margin-bottom:6px;
}
.nxt-txt {
  font-size:12px;
  line-height:1.6;
  color:rgba(255,255,255,.82);
}
.flow {
  display:flex;
  flex-direction:column;
  gap:4px;
}
.fstep {
  display:flex;
  align-items:center;
  gap:8px;
  padding:6px 8px;
  border-radius:6px;
  font-size:12px;
}
.fstep.done { color:var(--text3); }
.fstep.cur {
  color:var(--ink);
  font-weight:850;
  background:var(--accent-dim);
}
.fstep.nxt-s { color:var(--text2); }
.fstep.todo { color:var(--text3); }
.fdot {
  width:7px;
  height:7px;
  border-radius:50%;
  flex-shrink:0;
}
.fdot.done { background:var(--border2); }
.fdot.cur { background:var(--accent); box-shadow:0 0 0 4px var(--accent-glow); }
.fdot.nxt-s { background:#d8c65f; }
.fdot.todo { background:transparent; border:1px solid var(--border2); }
.btns {
  display:flex;
  flex-direction:column;
  gap:7px;
  margin-top:16px;
}
.btn {
  width:100%;
  min-height:36px;
  padding:0 12px;
  border-radius:6px;
  font-size:12px;
  font-weight:850;
  cursor:pointer;
  border:none;
  transition:background .12s,border-color .12s,transform .1s,color .12s;
  text-align:center;
}
.btn:hover { transform:translateY(-1px); }
.btn-p,.body-save,.to-script-btn,.modal-submit {
  background:var(--accent);
  color:#fff;
  box-shadow:0 10px 22px rgba(15,118,110,.16);
}
.btn-p:hover,.body-save:hover,.to-script-btn:hover,.modal-submit:hover { background:var(--accent-strong); }
.btn-s,.body-cancel {
  background:#fff;
  border:1px solid var(--border);
  color:var(--text2);
}
.btn-s:hover,.body-cancel:hover {
  border-color:var(--border2);
  color:var(--ink);
}
.btn-d {
  background:#fff3ef;
  border:1px solid #efc8bf;
  color:#a83227;
}
.btn-d:hover { background:#ffe9e2; }
.body-editor-wrap {
  margin:0;
  background:#fff;
  border:1px solid var(--border);
  border-radius:8px;
  padding:14px;
  box-shadow:0 8px 20px rgba(42,49,44,.06);
}
.editor-layout {
  display:grid;
  grid-template-columns:minmax(0,1fr) 300px;
  gap:14px;
  align-items:start;
}
.editor-main,.editor-side {
  display:flex;
  flex-direction:column;
  gap:12px;
}
.editor-toolbar {
  display:flex;
  gap:7px;
  flex-wrap:wrap;
}
.editor-tool {
  background:var(--bg3);
  border:1px solid var(--border);
  color:var(--text2);
  border-radius:6px;
  min-height:30px;
  padding:0 10px;
  font-size:11px;
  font-weight:850;
  cursor:pointer;
  transition:background .12s,border-color .12s,color .12s;
}
.editor-tool:hover {
  background:#fff;
  border-color:var(--border2);
  color:var(--text1);
}
.editor-field-grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:9px;
}
.editor-field {
  display:flex;
  flex-direction:column;
  gap:6px;
}
.editor-field.full { grid-column:1 / -1; }
.editor-label {
  color:var(--text3);
  font-size:9px;
  font-weight:900;
  letter-spacing:.09em;
  text-transform:uppercase;
}
.editor-input,.editor-select,.editor-meta-area {
  width:100%;
  background:#fffdf8;
  border:1px solid var(--border);
  border-radius:6px;
  color:var(--text1);
  outline:none;
  transition:border-color .15s,box-shadow .15s;
}
.editor-input,.editor-select {
  min-height:34px;
  padding:0 10px;
  font-size:12px;
}
.editor-meta-area {
  min-height:106px;
  resize:vertical;
  padding:10px;
  font-family:"SF Mono","Fira Code",monospace;
  font-size:10px;
  line-height:1.55;
}
.editor-input:focus,.editor-select:focus,.editor-meta-area:focus {
  border-color:var(--accent);
  box-shadow:0 0 0 3px var(--accent-glow);
}
.editor-panel {
  background:rgba(255,255,255,.54);
  border:1px solid var(--border);
  border-radius:8px;
  padding:12px;
}
.editor-panel-title {
  color:var(--text3);
  font-size:10px;
  font-weight:900;
  text-transform:uppercase;
  letter-spacing:.09em;
  margin-bottom:10px;
}
.body-editor-header {
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  margin-bottom:10px;
}
.body-toggle,.editor-save-small {
  background:none;
  border:none;
  color:var(--text2);
  font-size:10px;
  font-weight:900;
  text-transform:uppercase;
  letter-spacing:.08em;
  cursor:pointer;
  padding:0;
}
.body-toggle:hover,.editor-save-small:hover { color:var(--ink); }
.editor-title-input {
  width:100%;
  background:#fffdf8;
  border:1px solid var(--border);
  border-radius:8px;
  color:var(--text1);
  font-size:18px;
  font-weight:800;
  line-height:1.25;
  padding:10px 11px;
  margin-bottom:10px;
  outline:none;
  transition:border-color .15s,box-shadow .15s;
}
.editor-title-input:focus {
  border-color:var(--accent);
  box-shadow:0 0 0 3px var(--accent-glow);
}
.body-textarea {
  width:100%;
  background:#fff;
  border:1px solid var(--border);
  border-radius:8px;
  color:var(--text1);
  font-family:"SF Mono","Fira Code",monospace;
  font-size:11px;
  line-height:1.65;
  padding:11px;
  resize:vertical;
  min-height:calc(100vh - 370px);
  outline:none;
  transition:border-color .15s,box-shadow .15s;
}
.body-textarea:focus {
  border-color:var(--accent);
  box-shadow:0 0 0 3px var(--accent-glow);
}
.body-actions {
  display:flex;
  gap:7px;
  margin-top:8px;
}
.body-save {
  flex:1;
  border:none;
  border-radius:6px;
  min-height:34px;
  padding:0 12px;
  font-size:12px;
  font-weight:850;
  cursor:pointer;
}
.body-cancel {
  border-radius:6px;
  min-height:34px;
  padding:0 12px;
  font-size:12px;
  font-weight:850;
  cursor:pointer;
}
.raw {
  display:none;
  margin-top:12px;
  background:#101714;
  border:1px solid #27332e;
  border-radius:8px;
  padding:11px;
  font-family:"SF Mono","Fira Code",monospace;
  font-size:10px;
  color:#d6ded8;
  white-space:pre-wrap;
  word-break:break-all;
  max-height:180px;
  overflow-y:auto;
}

.to-script-form {
  padding:14px;
  border-top:1px solid var(--border);
  flex-shrink:0;
  background:var(--bg3);
}
.to-script-title {
  font-size:10px;
  font-weight:900;
  text-transform:uppercase;
  letter-spacing:.09em;
  color:var(--text3);
  margin-bottom:10px;
}
.to-script-row {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:7px;
  margin-bottom:9px;
}
.mini-select {
  width:100%;
  min-height:34px;
  padding:0 8px;
  font-size:11px;
}
.to-script-btn {
  width:100%;
  border:none;
  border-radius:6px;
  min-height:36px;
  padding:0 12px;
  font-size:12px;
  font-weight:850;
  cursor:pointer;
  transition:background .12s,transform .12s;
}
.to-script-btn:hover { transform:translateY(-1px); }

.modal-overlay {
  position:fixed;
  inset:0;
  background:rgba(23,32,28,.48);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:100;
  opacity:0;
  pointer-events:none;
  transition:opacity .18s;
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
}
.modal-overlay.open { opacity:1; pointer-events:all; }
.modal {
  background:var(--bg1);
  border:1px solid var(--border);
  border-radius:8px;
  padding:24px;
  width:460px;
  max-width:92vw;
  box-shadow:0 28px 70px rgba(23,32,28,.26);
  transform:translateY(10px) scale(.98);
  transition:transform .18s;
}
.modal-overlay.open .modal { transform:translateY(0) scale(1); }
.modal-head {
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:20px;
}
.modal-title {
  font-size:16px;
  font-weight:850;
  color:var(--ink);
}
.modal-close {
  width:30px;
  height:30px;
  background:var(--bg3);
  border:1px solid var(--border);
  border-radius:6px;
  color:var(--text2);
  font-size:20px;
  cursor:pointer;
  line-height:1;
}
.modal-close:hover { color:var(--ink); background:#fff; }
.form-row { margin-bottom:14px; }
.form-label {
  display:block;
  font-size:10px;
  font-weight:900;
  text-transform:uppercase;
  letter-spacing:.08em;
  color:var(--text3);
  margin-bottom:7px;
}
.form-input,.form-select,.form-textarea {
  width:100%;
  min-height:38px;
  padding:0 11px;
  font-size:13px;
}
.form-textarea {
  min-height:112px;
  padding:10px 11px;
  resize:vertical;
  line-height:1.5;
}
.form-grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
.modal.account-mode .content-only { display:none; }
.modal.account-mode .content-note-fields { display:none; }
.account-fields {
  display:none;
  border:1px solid var(--border);
  border-radius:8px;
  padding:12px;
  margin-bottom:14px;
  background:#0d1513;
}
.account-fields.show { display:block; }
.account-bulk-note {
  color:var(--text3);
  font-size:10px;
  line-height:1.5;
  margin-top:6px;
}
.check-row {
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}
.check-pill {
  min-height:32px;
  display:flex;
  align-items:center;
  gap:7px;
  padding:0 10px;
  border:1px solid var(--border);
  border-radius:999px;
  color:var(--text2);
  font-size:11px;
  font-weight:850;
}
.check-pill input { accent-color:var(--accent); }
.form-preview {
  background:#101714;
  border:1px solid #27332e;
  border-radius:8px;
  padding:11px 12px;
  font-size:11px;
  color:#d6ded8;
  margin-bottom:14px;
  line-height:1.7;
  font-family:"SF Mono","Fira Code",monospace;
  overflow-wrap:anywhere;
}
.form-preview span { color:#95a39a; }
.modal-submit {
  width:100%;
  border:none;
  border-radius:6px;
  min-height:40px;
  padding:0 12px;
  font-size:13px;
  font-weight:850;
  cursor:pointer;
  transition:background .14s,transform .12s,opacity .14s;
}
.modal-submit:hover { transform:translateY(-1px); }
.modal-submit:disabled {
  opacity:.42;
  cursor:not-allowed;
  transform:none;
  box-shadow:none;
}

#toast {
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#101714;
  border:1px solid #27332e;
  color:#fffdf7;
  border-radius:8px;
  padding:10px 18px;
  font-size:12px;
  font-weight:750;
  z-index:999;
  pointer-events:none;
  opacity:0;
  transition:opacity .2s,transform .2s;
  white-space:nowrap;
  box-shadow:0 14px 34px rgba(23,32,28,.22);
}
#toast.show {
  opacity:1;
  transform:translateX(-50%) translateY(-2px);
}
.loading {
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100%;
  width:100%;
  gap:12px;
  color:var(--text2);
  font-size:13px;
  font-weight:750;
}
.spin {
  width:24px;
  height:24px;
  border:3px solid var(--border);
  border-top-color:var(--accent);
  border-radius:50%;
  animation:sp .65s linear infinite;
}
@keyframes sp { to { transform:rotate(360deg); } }
mark {
  background:#fff1a8 !important;
  color:var(--ink) !important;
  border-radius:3px !important;
  padding:0 2px;
}
::-webkit-scrollbar { width:8px; height:8px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:#c7cec5; border-radius:999px; border:2px solid transparent; background-clip:padding-box; }
::-webkit-scrollbar-thumb:hover { background:#9fa9a1; border:2px solid transparent; background-clip:padding-box; }

/* Dark finish */
:root {

/* Structural overhaul */
#main {
  background:#08100e;
}
.topbar {
  min-height:54px;
  padding:8px 16px;
  display:grid;
  grid-template-columns:minmax(220px,1fr) auto auto;
  gap:14px;
}
.brand-block {
  display:flex;
  flex-direction:row;
  align-items:center;
  gap:10px;
}
.workspace-name {
  width:max-content;
  background:#0f1715;
  border:1px solid var(--border);
  border-radius:999px;
  color:var(--text3);
  padding:4px 10px;
  font-size:11px;
  font-weight:800;
}
.status-cluster {
  display:flex;
  align-items:center;
  gap:12px;
  padding:6px 10px;
  border:1px solid var(--border);
  border-radius:8px;
  background:rgba(15,23,21,.70);
}
.view-tabs {
  padding:0 16px;
  min-height:56px;
  gap:1px;
  background:#0b1311;
  justify-content:stretch;
  overflow-x:auto;
}
.vtab {
  flex:1 1 0;
  border:none;
  border-radius:0;
  min-height:56px;
  padding:0 22px;
  color:var(--text3);
  font-size:13px;
  text-align:center;
}
.vtab.on {
  background:#111a18;
  border:none;
}
.vtab.on::after {
  left:22px;
  right:22px;
  height:3px;
  border-radius:999px 999px 0 0;
}
.filterbar {
  display:grid;
  grid-template-columns:minmax(260px,max-content) minmax(260px,max-content) minmax(260px,1fr);
  align-items:center;
  gap:12px;
  padding:10px 16px;
  background:#111a18;
}
.filter-group {
  display:flex;
  align-items:center;
  gap:7px;
  min-width:0;
  border:1px solid var(--border);
  background:#0d1513;
  border-radius:8px;
  padding:7px;
  overflow-x:auto;
}
.filter-group .f-label {
  padding:0 6px 0 2px;
}
.search-wrap {
  display:flex;
  align-items:center;
  justify-content:flex-end;
  gap:8px;
  margin-left:0;
}
.search-input {
  width:min(320px,100%);
  min-height:38px;
}
.filter-reset {
  flex-shrink:0;
  min-height:38px;
}
.body {
  background:
    linear-gradient(180deg,rgba(57,183,159,.05),transparent 160px),
    #08100e;
}
.kanban-wrap {
  padding:16px 18px;
}
.kanban {
  display:flex;
  gap:12px;
  min-width:0;
  width:max-content;
  margin-inline:auto;
}
.col {
  width:248px;
  min-width:248px;
  max-width:248px;
  border-radius:10px;
  background:linear-gradient(180deg,#13201d,#0f1917);
}
.col-head {
  min-height:46px;
  padding:12px;
  background:rgba(255,255,255,.025);
}
.col-name {
  font-size:10px;
}
.cards {
  padding:9px;
  gap:7px;
}
.card {
  padding:10px;
  border-radius:7px;
  box-shadow:none;
}
.card:hover {
  transform:none;
  box-shadow:0 10px 24px rgba(0,0,0,.20);
}
.card-title {
  font-size:11px;
  line-height:1.38;
  margin-bottom:8px;
}
.tag {
  padding:2px 6px;
  font-size:8px;
}
.drop-hint {
  width:auto;
  min-height:34px;
  margin:0 9px 9px;
  cursor:pointer;
  font-size:10px;
  font-weight:900;
}
.drop-hint:hover {
  border-color:var(--accent);
  color:var(--accent-strong);
}
.research-wrap {
  padding:16px 18px;
  gap:12px;
  justify-content:safe center;
}
#view-research {
  display:grid;
  grid-template-rows:auto 1fr;
  align-content:start;
  gap:14px;
  overflow:auto;
  cursor:default;
}
#view-research:active {
  cursor:default;
}
.research-desk {
  width:100%;
  display:grid;
  grid-template-rows:auto 1fr;
  gap:14px;
  min-width:0;
}
.research-follow {
  border:1px solid var(--border);
  border-radius:10px;
  background:linear-gradient(180deg,#121d1a,#0d1513);
  overflow:hidden;
  border-color:#263631;
  background:#0b1311;
}

.insp-head {
  min-height:28px !important;
  padding:0 10px !important;
  background:#0b1311 !important;
  border-bottom:1px solid #263631 !important;
  color:#f3efe5;
  font-size:11px;
  box-shadow:none !important;
}

.insp-toggle {
  width:22px !important;
  height:22px !important;
  min-width:22px;
  min-height:22px;
  font-size:13px;
  background:#111a18;
  border-color:#263631;
  color:#a8b8b1;
}
.research-follow-head {
  min-height:48px;
  padding:12px 14px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  border-bottom:1px solid var(--border);
  background:rgba(255,255,255,.025);
}
.research-follow-title {
  color:var(--text1);
  font-size:13px;
  font-weight:900;
}
.research-follow-sub {
  color:var(--text3);
  margin-top:3px;
  font-size:10px;
  font-weight:750;
}
.research-collapse {
  min-height:30px;
  padding:0 10px;
  border:1px solid var(--border);
  border-radius:6px;
  background:#0d1513;
  color:var(--text2);
  font-size:10px;
  font-weight:850;
  cursor:pointer;
}
.research-collapse:hover {
  color:var(--text1);
  border-color:var(--border2);
}
.research-follow-row {
  padding:10px;
  display:flex;
  gap:8px;
  overflow-x:auto;
}
.research-follow-row .rcard {
  width:220px;
  flex:0 0 220px;
}
.research-buckets {
  width:100%;
  max-width:none;
  margin-inline:0;
  display:grid;
  grid-template-columns:repeat(4, minmax(240px, 1fr));
  gap:14px;
  align-items:stretch;
}
.research-bucket {
  min-height:calc(100vh - 224px);
  background:linear-gradient(180deg,#121d1a,#0d1513);
  border:1px solid var(--border);
  border-radius:10px;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  border:1px solid #263631 !important;
  box-shadow:0 22px 70px rgba(0,0,0,.48) !important;
}

.insp.open {
  border-color:#263631 !important;
}
.research-bucket-head {
  padding:14px;
  border-bottom:1px solid var(--border);
  background:rgba(255,255,255,.025);
}
.research-urgent .research-bucket-head {
  border:1px solid #ff7a66;
  border-bottom-color:#ff7a66;
  background:#211311;
}
.research-urgent .research-bucket-name {
  color:#ff9b89;
}
.research-bucket-row {
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  margin-bottom:6px;
}
.research-bucket-name {
  color:var(--text1);
  font-size:13px;
  font-weight:900;
}
.research-bucket-count {
  color:var(--text3);
  background:#0d1513;
  border:1px solid var(--border);
  border-radius:999px;
  padding:3px 8px;
  font-size:10px;
  font-weight:850;
}
.research-bucket-purpose {
  color:var(--text3);
  font-size:11px;
  line-height:1.45;
  min-height:32px;
}
.research-stream {
  flex:1;
  overflow-y:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
  gap:8px;
}
.research-add {
  margin:0 10px 10px;
  min-height:34px;
  border:1px dashed var(--border2);
  border-radius:7px;
  background:rgba(15,23,21,.70);
  color:var(--text3);
  font-size:10px;
  font-weight:900;
  cursor:pointer;
}
.research-add:hover {
  color:var(--accent-strong);
  border-color:var(--accent);
}
.research-empty {
  min-height:120px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  color:var(--text3);
  border:1px dashed var(--border);
  border-radius:8px;
  padding:14px;
  font-size:11px;
  font-weight:750;
  line-height:1.5;
}
.rsect {
  width:300px;
  border-radius:10px;
}
.archive-wrap {
  display:block;
  overflow:auto;
}
.archive-wrap .archive-section {
  width:min(760px,100%);
  margin-inline:auto;
  min-height:calc(100vh - 190px);
}
.empty-list {
  min-height:180px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:var(--text3);
  font-size:12px;
  font-weight:800;
  border:1px dashed var(--border);
  border-radius:8px;
}
@media (max-width:900px) {
  html,body { overflow:auto; }
  #landing {
    grid-template-columns:1fr;
    grid-template-areas:
      "mark"
      "title"
      "sub"
      "panel";
    align-content:center;
    gap:18px;
    padding:28px;
  }
  .topbar {
    grid-template-columns:1fr;
    align-items:start;
    height:auto;
  }
  .status-cluster { width:100%; justify-content:space-between; }
  .tb-right {
    width:100%;
    margin-left:0;
    justify-content:flex-end;
  }
  .filterbar {
    grid-template-columns:1fr;
    overflow-x:visible;
  }
  .filter-group { width:100%; }
  .search-wrap {
    width:100%;
    margin-left:0;
    justify-content:stretch;
  }
  .search-input { width:100%; }
  .body {
    flex-direction:column;
    overflow:auto;
  }
  .kanban-wrap,.research-wrap {
    min-height:58vh;
    overflow:auto;
  }
  .kanban { min-width:max-content; margin-inline:0; }
  .research-wrap { justify-content:flex-start; }
  .research-buckets {
    margin-inline:0;
    grid-template-columns:repeat(4, minmax(286px, 330px));
    width:max-content;
  }
  .insp.open {
    top:50%;
    left:50%;
    width:calc(100vw - 20px);
    height:calc(100vh - 20px);
    transform:translate(-50%,-50%);
    border:1px solid var(--border);
    box-shadow:none;
  }
  .editor-layout {
    grid-template-columns:1fr;
  }
  .body-textarea {
    min-height:52vh;
  }
}
@media (max-width:560px) {
  #landing { padding:22px; }
  #landing h1 { font-size:42px; }
  .view-tabs {
    overflow-x:auto;
    justify-content:flex-start;
    padding-left:12px;
    padding-right:12px;
  }
  .vtab { padding-left:12px; padding-right:12px; }
  .kanban-wrap,.research-wrap { padding:12px; }
  .col {
    width:82vw;
    min-width:82vw;
    max-width:82vw;
  }
  .form-grid,.to-script-row { grid-template-columns:1fr; }
  .modal { padding:18px; }
}

/* Unified dark interface pass */
:root {
  --bg0:#070c0b;
  --bg1:#0b1210;
  --bg2:#101917;
  --bg3:#15221f;
  --bg4:#1b2a26;
  --surface:#101917;
  --surface2:#0d1513;
  --surface3:#14201d;
  --header:#121d1a;
  --text1:#f3efe5;
  --text2:#b4bdb7;
  --text3:#74837c;
  --border:#263631;
  --border2:#40534c;
  --accent:#39b79f;
  --accent-strong:#7dd6c4;
  --accent-dim:#0f302b;
  --accent-glow:rgba(57,183,159,.20);
  --panel-shadow:0 24px 60px rgba(0,0,0,.34);
  --card-shadow:0 14px 30px rgba(0,0,0,.22);
}

body,
#main,
.body {
  background:
    linear-gradient(180deg,rgba(57,183,159,.045),transparent 190px),
    var(--bg0);
  color:var(--text1);
}

.logo,
.workspace-name,
.status-cluster,
.view-tabs,
.filterbar,
.filter-group,
.col,
.research-follow,
.research-bucket,
.rsect,
.archive-wrap .archive-section,
.insp,
.modal,
.body-editor-wrap,
.editor-panel,
.account-fields,
.to-script-form {
  border-color:var(--border);
}

.topbar,
.view-tabs,
.filterbar,
.insp-head,
.modal-head {
  background:var(--bg1);
}

.filter-group,
.status-cluster,
.workspace-name,
.col,
.research-follow,
.research-bucket,
.rsect,
.modal,
.body-editor-wrap,
.editor-panel,
.account-fields {
  background:var(--surface);
}

.col,
.research-follow,
.research-bucket,
.rsect,
.modal,
.body-editor-wrap,
.editor-panel,
.account-fields,
.form-preview,
.raw,
#toast {
  border:1px solid var(--border);
  box-shadow:none;
}

.col-head,
.research-follow-head,
.research-bucket-head,
.rsect-head,
.insp-head,
.to-script-form {
  background:var(--header);
  border-color:var(--border);
}

.research-urgent .research-bucket-head {
  background:#211311;
  border-color:#ff7a66;
}

.logo,
.modal-title,
.research-follow-title,
.research-bucket-name,
.rsect-title,
.card-title,
.rcard-title,
.editor-title-input,
.ival {
  color:var(--text1);
}

.workspace-name,
.chip,
.online,
#fcount,
.f-label,
.col-name,
.col-n,
.research-follow-sub,
.research-bucket-purpose,
.research-bucket-count,
.rsect-n,
.rcard-sub,
.ilbl,
.meta-k,
.meta-v,
.editor-panel-title,
.editor-label,
.to-script-title,
.form-label,
.account-bulk-note,
.empty,
.empty-list,
.research-empty {

}

.vtab,
.tb-btn,
.pill,
.research-collapse,
.research-add,
.drop-hint,
.editor-tool,
.btn-s,
.body-cancel,
.modal-close,
.insp-toggle,
.check-pill {

}

.vtab:hover,
.tb-btn:hover,
.pill:hover,
.research-collapse:hover,
.research-add:hover,
.drop-hint:hover,
.editor-tool:hover,
.btn-s:hover,
.body-cancel:hover,
.modal-close:hover,
.insp-toggle:hover,
.check-pill:hover {
  background:var(--surface3);
  border-color:var(--border2);
  color:var(--text1);
}

.vtab.on,
.pill.on {
  background:var(--text1);
  border-color:var(--text1);
  color:#07100e;
}

.tb-btn-new,
.open-btn,
.btn-p,
.body-save,
.to-script-btn,
.modal-submit {

  border-color:var(--accent);

.tb-btn-new:hover,
.open-btn:hover,
.btn-p:hover,
.body-save:hover,
.to-script-btn:hover,
.modal-submit:hover,
.r-script-btn:hover,
.date-save:hover {
  background:var(--accent-strong);
  border-color:var(--accent-strong);
  color:#07100e;
}

.card,
.rcard,
.research-follow-row .rcard {
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:8px;
  color:var(--text1);

}

  box-shadow:var(--card-shadow);

.card.on,
.rcard.on,

  border-color:var(--accent);
  box-shadow:0 0 0 2px var(--accent-glow);

.drop-hint,
.research-add,

.search-input,

.search-input:focus,

.mini-select:focus,
.form-input:focus,
.form-select:focus,
.form-textarea:focus,
.editor-input:focus,
.editor-select:focus,
.editor-meta-area:focus,
.editor-title-input:focus,
.body-textarea:focus {
  border-color:var(--accent);
  box-shadow:0 0 0 3px var(--accent-glow);
}

.form-preview,
.raw,
#toast {

}

.r-script-btn,
.date-save {
  background:var(--text1);

}

.btn-d {
  background:#211311;
  border:1px solid #66362f;

}

.btn-d:hover {
  background:#2b1714;

.tag-traceback {

.tag-motivational {

.logo,
.vtab,
.f-label,
.pill,
.col-name,
.research-follow-title,
.research-bucket-name,
.rsect-title,
.tag,
.ilbl,

.insp {

/* ── CALENDAR VIEW ── */
.cal-wrap { flex:1; min-height:0; display:flex; flex-direction:column; padding:10px 14px 14px; overflow:hidden; }
.cal-head { display:flex; align-items:center; gap:10px; margin-bottom:10px; flex-shrink:0; }
.cal-nav {
  width:32px; height:32px; border-radius:8px; border:1px solid var(--border);
  background:var(--bg2); color:var(--text1); font-size:18px; line-height:1; cursor:pointer;
  display:flex; align-items:center; justify-content:center; transition:background .14s,border-color .14s;
}
.cal-nav:hover { background:var(--bg3); border-color:var(--border2); }
.cal-title { font-size:18px; font-weight:800; color:var(--ink); min-width:170px; }
.cal-today {
  padding:7px 14px; border-radius:8px; border:1px solid var(--border); background:var(--bg2);
  color:var(--text1); font-size:12px; font-weight:700; cursor:pointer; transition:background .14s;
}
.cal-today:hover { background:var(--bg3); }
.cal-legend { margin-left:auto; display:flex; align-items:center; gap:6px; font-size:12px; font-weight:700; color:var(--text2); }
.cal-dot { width:10px; height:10px; border-radius:3px; display:inline-block; margin:0 4px 0 12px; }
.cal-legend .cal-dot:first-child { margin-left:0; }
.dot-film { background:var(--green); }
.dot-post { background:var(--accent); }
/* weekday header (month only) — flat, aligned to columns */
.cal-dow { display:grid; grid-template-columns:repeat(7,1fr); flex-shrink:0; border-bottom:1px solid var(--border); }
.cal-dow span {
  padding:8px 0 8px 8px; text-align:left; font-size:11px; font-weight:700;
  text-transform:uppercase; letter-spacing:.04em; color:var(--text3);
}
/* grid host fills the whole area */
.cal-grid { flex:1; min-height:0; overflow:hidden; }

/* ── MONTH (flat, Google-style) ── */
.cal-grid.grid-month {
  display:grid; grid-template-columns:repeat(7,1fr); grid-auto-rows:1fr;
  border-left:1px solid var(--border); border-top:1px solid var(--border);
}
.cal-cell {
  background:var(--bg1); border-right:1px solid var(--border); border-bottom:1px solid var(--border);
  padding:1px 4px 4px; display:flex; flex-direction:column; gap:2px; min-height:0; overflow:hidden;
  transition:background .1s;
}
.cal-cell.other-month { background:var(--bg3); }
.cal-cell.other-month .cal-daynum { color:var(--text3); }

<script>
'use strict';
const IS_SERVER = location.protocol==='http:'||location.protocol==='https:';

// Flow config
const ALIAS = { 'script-draft':'script', pipeline:'script', published:'posted', post:'posted', film:'film-today', skip:'archive', skipped:'archive', archived:'archive' };
const FLOW = [
  { key:'research',      label:'Research',      color:'#f59e0b', bg:'#1c1400', icon:'RS' },
  { key:'script',        label:'Script',        color:'#3b82f6', bg:'#0d1a30', icon:'SC' },
  { key:'ready-to-film', label:'Ready to Film', color:'#06b6d4', bg:'#00191c', icon:'RF' },
  { key:'film-today',    label:'Film Today',    color:'#10b981', bg:'#001911', icon:'FT' },
  { key:'filmed',        label:'Filmed',        color:'#84cc16', bg:'#0e1900', icon:'FD' },
  { key:'ready-to-post', label:'Scheduled', color:'#f97316', bg:'#1c0e00', icon:'SD' },
  { key:'posted',        label:'Posted',        color:'#6b7280', bg:'#111',    icon:'PO' },
  { key:'archive',       label:'Archive',       color:'#64748b', bg:'#111827', icon:'AR' },
];
const FLOW_MAP = Object.fromEntries(FLOW.map(s=>[s.key,s]));
const NEXT = { research:'script',script:'ready-to-film','ready-to-film':'film-today','film-today':'filmed',filmed:'ready-to-post','ready-to-post':'posted' };
const GUIDANCE = {
  research:      'Good catch. Review this idea - if it has legs, turn it into <strong>Script</strong>.',
  script:        'Script is ready. Review once, then move to <strong>Ready to Film</strong>.',
  'ready-to-film':'Locked in. Set a film date. After filming, move to <strong>Film Today</strong>.',
  'film-today':  'Film this today. After recording, move to <strong>Filmed</strong>.',
  filmed:        'Raw footage in. Edit and prep. Then move to <strong>Scheduled</strong>.',
  'ready-to-post':'Queued. Schedule or post now. Once live, move to <strong>Posted</strong>.',
  posted:        'Live. Check analytics in 48h and log in Weekly Review.',
  archive:       'Stored out of the active board. Restore it to Script if it becomes useful again.',
};

const ACCT_FOLDER = { traceback:'00 Brand','personal-ai':'00 Brand',motivational:'00 Brand' };
const FMT_FOLDER  = { 'short-form':'00 Short Form','long-form':'01 Long Form',x:'02 X',carousel:'03 Carousels',story:'04 Stories' };
const BRAND_BRAIN = {
  traceback:'00 Brand/00 Traceback',
  'personal-ai':'00 Brand/01 Personal',
  motivational:'00 Brand/02 Motivation'
};
const FORMAT_HUB = {
  'short-form':'02 Formats/00 Short Form',
  'long-form':'02 Formats/01 Long Form',
  x:'02 Formats/02 X',
  carousel:'02 Formats/03 Carousels',
  story:'02 Formats/04 Stories'
};
const STATUS_HUB = {
  research:'01 Research/00 research',
  script:'03 Board/00 Script/00 script',
  'ready-to-film':'03 Board/01 Ready to Film/00 ready-to-film',
  'film-today':'03 Board/02 Film Today/00 film-today',
  filmed:'03 Board/03 Filmed/00 filmed',
  'ready-to-post':'03 Board/04 Ready to Post/00 ready-to-post',
  posted:'03 Board/05 Posted/00 posted',
  archive:'04 Archive/00 archive'
};
const RESEARCH_HUB = {
  accounts:'01 Research/00 Accounts/00 accounts',
  daily:'01 Research/01 Daily Topics/00 daily-topics',
  reels:'01 Research/02 Reels/00 reels',
  weekly:'01 Research/03 Weekly/00 weekly',
  urgent:'01 Research/04 Urgent/00 urgent'
};
const CONTENT_OS_HUB = '00 Content OS';
const HUB_FILES = new Set([
  CONTENT_OS_HUB,
  ...Object.values(BRAND_BRAIN),
  ...Object.values(FORMAT_HUB),
  ...Object.values(STATUS_HUB),
  ...Object.values(RESEARCH_HUB),
  '01 Research/00 research',
  '03 Board/00 board',
  '99 Admin/00 admin'
]);
const ACCOUNT_META = [
  { key:'traceback', label:'Traceback', purpose:'Ideas, accounts, and angles for tech breakdown content.' },
  { key:'personal-ai', label:'Personal AI', purpose:'Creators, workflows, and examples for practical AI content.' },
  { key:'motivational', label:'Motivational', purpose:'Voices, stories, and hooks for self-improvement content.' },
];
const RESEARCH_BUCKETS = [
  { key:'daily', label:'Daily Topics', purpose:'Loose topic ideas and quick finds worth checking today.' },
  { key:'reels', label:'Reels', purpose:'Short-form examples, formats, hooks, and pacing to study.' },
  { key:'weekly', label:'Weekly', purpose:'Bigger patterns and accounts worth reviewing each week.' },
  { key:'urgent', label:'Urgent', purpose:'Time-sensitive stories and signals to act on soon.' },
];
// State
let files=[], rootHandle=null, selPath=null;
let accFilter='all', fmtFilter='all', searchQuery='', researchFollowCollapsed=true, modalResearchBucket='daily', dragPath=null;
let bodyOpen=false, curView='research';

function updateCounts() {
  const active=files.filter(f=>isContent(f)&&f.status!=='archive').length;
  const research=files.filter(isResearchItem).length;
  const archived=files.filter(f=>!isHubFile(f)&&f.status==='archive').length;
  document.getElementById('fcount').textContent=`${active} active | ${research} research | ${archived} archived`;
}

// YAML
function parseFM(text) {
  const m=text.match(/^---\r?\n([\s\S]*?)\r?\n---\r?\n?([\s\S]*)$/);
  if (!m) return {data:{},body:text};
  const data={};
  m[1].split('\n').forEach(line=>{
    const ci=line.indexOf(':'); if(ci<0)return;
    const k=line.slice(0,ci).trim(), v=line.slice(ci+1).trim();
    data[k]=v===''?null:v.replace(/^["']|["']$/g,'');
  });
  return {data,body:m[2]};
}
function writeFM(data,body) {
  return '---\n'+Object.entries(data).map(([k,v])=>v==null?`${k}:`:`${k}: ${v}`).join('\n')+'\n---\n'+body;
}

// Detection
function normStatus(raw) {
  if(!raw) return null;
  const s=String(raw).toLowerCase().trim();
  return ALIAS[s]||(FLOW_MAP[s]?s:null);
}
function accountKey(raw) {
  const s=String(raw||'').toLowerCase().trim();
  if(!s) return null;
  if(s==='traceback'||s.includes('traceback')) return 'traceback';
  if(s==='personal-ai'||s==='personal ai'||s.includes('personal-ai')||s.includes('personal ai')) return 'personal-ai';
  if(s==='motivational'||s==='motivation'||s.includes('motivational')||s.includes('motivation')) return 'motivational';
  return null;
}
function detectAccount(p,d,body='') {
  const known=accountKey(d.account)||accountKey(d.brand)||accountKey(d.account_for)||accountKey(d.accounts_for)||accountKey(d.for);
  if(known) return known;
  const hay=`${p}\n${body||''}`;
  if(/(?:^|\/)(?:\d{2}\s+)?Brand\/(?:\d{2}\s+)?Traceback(?:\.md|\/|$)/i.test(p)) return 'traceback';
  if(/(?:^|\/)(?:\d{2}\s+)?Brand\/(?:\d{2}\s+)?Personal(?:\.md|\/|$)/i.test(p)) return 'personal-ai';
  if(/(?:^|\/)(?:\d{2}\s+)?Brand\/(?:\d{2}\s+)?Motivation(?:\.md|\/|$)/i.test(p)) return 'motivational';
  if(/traceback/i.test(hay)) return 'traceback';
  if(/personal[-\s]?ai|personal ai/i.test(hay)) return 'personal-ai';
  if(/motivational|motivation/i.test(hay)) return 'motivational';
  return null;
}
function formatKey(raw) {
  const s=String(raw||'').toLowerCase().trim();
  if(!s) return null;
  if(s==='short-form'||s==='short form'||s==='short') return 'short-form';
  if(s==='long-form'||s==='long form'||s==='long') return 'long-form';
  if(s==='x'||s==='twitter') return 'x';
  if(s==='carousel'||s==='carousels') return 'carousel';
  if(s==='story'||s==='stories') return 'story';
  return null;
}
function detectFormat(p,d,body='') {
  const known=formatKey(d.format)||formatKey(d.account_format);
  if(known) return known;
  const hay=`${p}\n${body||''}`;
  if(/\/(?:\d{2}\s+)?Short Form(?:\.md|\/|$)/i.test(p)) return 'short-form';
  if(/\/(?:\d{2}\s+)?Long Form(?:\.md|\/|$)/i.test(p))  return 'long-form';
  if(/\/(?:\d{2}\s+)?X(?:\.md|\/|$)/i.test(p))          return 'x';
  if(/\/(?:\d{2}\s+)?Carousels?(?:\.md|\/|$)/i.test(p)) return 'carousel';
  if(/\/(?:\d{2}\s+)?Stories?(?:\.md|\/|$)/i.test(p))   return 'story';
  if(/short[-\s]?form|reel|shorts/i.test(hay)) return 'short-form';
  if(/long[-\s]?form/i.test(hay)) return 'long-form';
  return null;
}
function detectStatus(p,d) {
  const s=normStatus(d.status); if(s) return s;
  if(/(?:^|\/)(?:\d{2}\s+)?Board\/(?:\d{2}\s+)?Script\//i.test(p)) return 'script';
  if(/(?:^|\/)(?:\d{2}\s+)?Board\/(?:\d{2}\s+)?Ready to Film\//i.test(p)) return 'ready-to-film';
  if(/(?:^|\/)(?:\d{2}\s+)?Board\/(?:\d{2}\s+)?Film Today\//i.test(p)) return 'film-today';
  if(/(?:^|\/)(?:\d{2}\s+)?Board\/(?:\d{2}\s+)?Filmed\//i.test(p)) return 'filmed';
  if(/(?:^|\/)(?:\d{2}\s+)?Board\/(?:\d{2}\s+)?Ready to Post\//i.test(p)) return 'ready-to-post';
  if(/(?:^|\/)(?:\d{2}\s+)?Board\/(?:\d{2}\s+)?Posted\//i.test(p)) return 'posted';
  if(/(?:^|\/)(?:\d{2}\s+)?Archive\//i.test(p)) return 'archive';
  if(/(?:^|\/)(?:\d{2}\s+)?Formats\//i.test(p))  return null;
  if(/\/pipeline\//i.test(p)) return 'script';
  return 'research';
}

// Research buckets: daily topics / reels / urgent / weekly
function researchType(p) {
  if(/\/(?:\d{2}\s+)?Urgent\b|\/(?:\d{2}\s+)?Breaking\b/i.test(p)) return 'urgent';
  if(/\/(?:\d{2}\s+)?Reels\b|\/(?:\d{2}\s+)?Shorts\b|\/(?:\d{2}\s+)?Hooks\b/i.test(p)) return 'reels';
  if(/\/(?:\d{2}\s+)?Accounts\b/i.test(p)) return 'accounts';
  if(/\/(?:\d{2}\s+)?Weekly\b|\/(?:\d{2}\s+)?Trending\b/i.test(p)) return 'weekly';
  if(/\/(?:\d{2}\s+)?Daily Topics\b|\/(?:\d{2}\s+)?Daily\b/i.test(p)) return 'daily';
  return 'daily';
}

function cleanHubPath(path) {
  return String(path||'').replace(/\.md$/i,'').replace(/\\/g,'/');
}
function isHubFile(f) {
  return HUB_FILES.has(cleanHubPath(f.path));
}
function isResearch(f) { return /(?:^|\/)(?:\d{2}\s+)?Research\//i.test(f.path); }
function isBrand(f)    { return /(?:^|\/)(?:\d{2}\s+)?Brand\//i.test(f.path); }
function isContent(f)  {
  if(isHubFile(f)) return false;
  if(isResearch(f)||isBrand(f)) return false;
  if(['Playbook','Reference','Folder Hub','Brand','System Hub'].includes(f.data.node_type)) return false;
  if(!f.account&&!f.format&&!f.status) return false;
  return true;
}

function getTitle(name,body,data) {
  if(data.summary) return data.summary;
  const h1=body&&body.match(/^#+\s+(.+)$/m);
  if(h1) return h1[1].replace(/\*\*/g,'').trim();
  return name.replace(/^\(C\)\s*/,'').replace(/^[\d\s]+/,'').replace(/\.md$/,'').trim();
}
function enrich(raw) {
  const title=getTitle(raw.name,raw.body,raw.data);
  const account=detectAccount(raw.path,raw.data,`${title}\n${raw.name}\n${raw.body}`);
  const format=detectFormat(raw.path,raw.data,`${title}\n${raw.name}\n${raw.body}`);
  const status=detectStatus(raw.path,raw.data);
  const rtype=isResearch({path:raw.path})?researchType(raw.path):null;
  return {...raw,account,format,status,title,rtype};
}

function accountForList(f) {
  const raw=f.data.account_for||f.data.accounts_for||f.data.for||f.account||'';
  return String(raw).split(/[,\n]/).map(s=>accountKey(s)||s.trim()).filter(Boolean);
}

function researchMatchesAccount(f,account) {
  if(account==='all') return true;
  if(f.rtype==='accounts') return accountForList(f).includes(account);
  return f.account===account;
}

// ── CALENDAR ──────────────────────────────────────────────────────────────
const GC_API='http://localhost:3737';
let calCursor=new Date();
let calMode='month';   // 'month' (default) | 'week' | 'day'
let tgDays=[];          // date strings currently shown in the week/day time grid
const CAL_FIELDS=[
  // colorId maps to Google Calendar event colors: 10 = Basil (green), 7 = Peacock (teal)
  {field:'film_date', timeField:'film_time', durField:'film_dur', idKey:'gcal_film_id', cls:'film', label:'Film', colorId:'10'},
  {field:'post_date', timeField:'post_time', durField:'post_dur', idKey:'gcal_post_id', cls:'post', label:'Post', colorId:'7'},
];

function ymd(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function addDays(ymdStr,n){ const d=new Date(ymdStr+'T00:00:00'); d.setDate(d.getDate()+n); return ymd(d); }
function pad2(n){ return String(n).padStart(2,'0'); }
// Build local start/end ISO (no Z) for a timed event of `dur` minutes (default 60)
function timedRange(date,time,dur){
  const [Y,M,D]=date.split('-').map(Number);
  const [h,mi]=time.split(':').map(Number);
  const s=new Date(Y,M-1,D,h,mi,0);
  const e=new Date(s.getTime()+(dur||60)*60000);
  const fmt=d=>`${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}T${pad2(d.getHours())}:${pad2(d.getMinutes())}:00`;
  return {startISO:fmt(s),endISO:fmt(e)};
}
// time string <-> minutes helpers + clamp
function timeToMin(t){ const [h,m]=String(t||'0:0').split(':').map(Number); return (h||0)*60+(m||0); }
function minToTime(m){ m=((Math.round(m)%1440)+1440)%1440; return pad2(Math.floor(m/60))+':'+pad2(m%60); }
function clampN(v,lo,hi){ return Math.max(lo,Math.min(hi,v)); }
function calChipHTML(f,cf,time){
  const t=time?`<span class="cal-chip-t">${esc(time)}</span>`:'';
  return `<div class="cal-chip ${cf.cls}" draggable="true"
     data-path="${escA(f.path)}" data-field="${cf.field}"
     onclick="selectCard('${escA(f.path)}')"
     title="${esc(cf.label)}: ${esc(f.title||f.name)}${time?(' @ '+esc(time)):''}">${esc(f.title||f.name)}${t}</div>`;
}

const HOUR_H=48;   // px per hour in week/day time grid
function labelHour(h){
  const ap=h<12?'AM':'PM'; let hr=h%12; if(hr===0) hr=12;
  return `${hr} ${ap}`;
}
function startOfWeek(d){ const x=new Date(d.getFullYear(),d.getMonth(),d.getDate()); x.setDate(x.getDate()-x.getDay()); return x; }

function setCalMode(mode){
  calMode=mode;
  ['month','week','day'].forEach(mm=>{
    const b=document.getElementById('cal-mode-'+mm);
    if(b) b.classList.toggle('on',mm===mode);
  });
  renderCalendar();
}
// Open a specific day in Day view (from clicking a month day-number or a week column header)
function openDayFromDate(ds){
  calCursor=new Date(ds+'T00:00:00');
  setCalMode('day');
}

function calMonth(dir){
  if(dir===0){ calCursor=new Date(); }
  else if(calMode==='day'){ calCursor=new Date(calCursor.getFullYear(),calCursor.getMonth(),calCursor.getDate()+dir); }
  else if(calMode==='week'){ calCursor=new Date(calCursor.getFullYear(),calCursor.getMonth(),calCursor.getDate()+dir*7); }
  else { calCursor=new Date(calCursor.getFullYear(),calCursor.getMonth()+dir,1); }
  renderCalendar();
}

function renderCalendar(){
  const grid=document.getElementById('cal-grid');
  if(!grid) return;
  if(!grid._ctxWired){ grid.addEventListener('contextmenu',onCalContextMenu); grid._ctxWired=true; }
  const dow=document.querySelector('.cal-dow');
  if(dow) dow.style.display=calMode==='month'?'':'none';
  grid.classList.toggle('grid-month',calMode==='month');
  grid.classList.toggle('grid-time',calMode!=='month');
  if(calMode==='month') renderCalMonth(grid);
  else renderTimeGrid(grid, calMode==='week'
    ? Array.from({length:7},(_,i)=>{ const s=startOfWeek(calCursor); return new Date(s.getFullYear(),s.getMonth(),s.getDate()+i); })
    : [new Date(calCursor.getFullYear(),calCursor.getMonth(),calCursor.getDate())]);
}

function renderCalMonth(grid){
  const y=calCursor.getFullYear(), m=calCursor.getMonth();
  document.getElementById('cal-title').textContent=
    calCursor.toLocaleDateString('en-US',{month:'long',year:'numeric'});
  const first=new Date(y,m,1);
  const start=new Date(y,m,1-first.getDay());
  const todayStr=ymd(new Date());

  const byDate={};
  files.forEach(f=>CAL_FIELDS.forEach(cf=>{
    const dv=f.data&&f.data[cf.field];
    if(dv){ (byDate[dv]=byDate[dv]||[]).push({f,cf,time:cf.timeField&&f.data[cf.timeField]}); }
  }));

  const daysInMonth=new Date(y,m+1,0).getDate();
  const cells=Math.ceil((first.getDay()+daysInMonth)/7)*7;  // only the weeks this month actually needs
  let html='';
  for(let i=0;i<cells;i++){
    const d=new Date(start); d.setDate(start.getDate()+i);
    const ds=ymd(d);
    const other=d.getMonth()!==m;
    const chips=(byDate[ds]||[]).map(it=>calChipHTML(it.f,it.cf,it.time)).join('');
    html+=`<div class="cal-cell${other?' other-month':''}${ds===todayStr?' today':''}" data-date="${ds}">
      <span class="cal-daynum" onclick="openDayFromDate('${ds}')" title="Open day">${d.getDate()}</span>
      <div class="cal-chips">${chips}</div>
    </div>`;
  }
  grid.innerHTML=html;
  wireCalendarDnD();
}

// Assign side-by-side lanes to overlapping timed events
function assignLanes(evs){
  evs.sort((a,b)=>a.s-b.s||a.e-b.e);
  const laneEnds=[];
  evs.forEach(ev=>{
    let placed=false;
    for(let i=0;i<laneEnds.length;i++){ if(laneEnds[i]<=ev.s){ ev.lane=i; laneEnds[i]=ev.e; placed=true; break; } }
    if(!placed){ ev.lane=laneEnds.length; laneEnds.push(ev.e); }
  });
  const n=Math.max(1,laneEnds.length);
  evs.forEach(ev=>ev.lanes=n);
  return evs;
}

// Shared Week/Day time grid — Google-style hours axis, full-width day columns,
// timed events as blocks sized by duration; all-day items in a top strip.
function renderTimeGrid(grid, days){
  const todayStr=ymd(new Date());
  const prevScroll=(()=>{ const s=grid.querySelector('.tg-scroll'); return s?s.scrollTop:null; })();
  if(days.length>1){
    const a=days[0], b=days[days.length-1];
    document.getElementById('cal-title').textContent=
      `${a.toLocaleDateString('en-US',{month:'short',day:'numeric'})} – ${b.toLocaleDateString('en-US',{month:'short',day:'numeric'})}, ${b.getFullYear()}`;
  } else {
    document.getElementById('cal-title').textContent=
      days[0].toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
  }

  const dd=days.map(d=>{
    const ds=ymd(d); const allday=[], timed=[];
    files.forEach(f=>CAL_FIELDS.forEach(cf=>{
      if(f.data&&f.data[cf.field]===ds){
        const t=cf.timeField&&f.data[cf.timeField];
        if(t){ const s=timeToMin(t); const dur=(cf.durField&&parseInt(f.data[cf.durField],10))||60; timed.push({f,cf,time:t,s,e:s+dur,dur}); }
        else allday.push({f,cf});
      }
    }));
    assignLanes(timed);
    return {d,ds,allday,timed};
  });

  const multi=days.length>1;
  // Header (week shows day name+number; day view shows nothing here)
  let head='';
  if(multi){
    head=`<div class="tg-head"><div class="tg-corner"></div>`+
      dd.map(x=>`<div class="tg-hcol${x.ds===todayStr?' today':''}" onclick="openDayFromDate('${x.ds}')">
        <span class="tg-hname">${x.d.toLocaleDateString('en-US',{weekday:'short'})}</span>
        <span class="tg-hnum">${x.d.getDate()}</span></div>`).join('')+`</div>`;
  }
  // All-day strip
  const allday=`<div class="tg-allday"><div class="tg-corner">all-day</div><div class="tg-allcols">`+
    dd.map(x=>`<div class="tg-allcol">`+x.allday.map(it=>calChipHTML(it.f,it.cf)).join('')+`</div>`).join('')+`</div></div>`;
  // Hours axis
  const axis=`<div class="tg-axis">`+
    Array.from({length:24},(_,h)=>`<div class="tg-hr" style="height:${HOUR_H}px"><span>${labelHour(h)}</span></div>`).join('')+`</div>`;
  // Day columns with positioned events + now-line
  const nowMin=new Date().getHours()*60+new Date().getMinutes();
  const cols=`<div class="tg-cols" id="tg-cols">`+dd.map(x=>{
    const lines=Array.from({length:24},()=>`<div class="tg-line" style="height:${HOUR_H}px"></div>`).join('');
    const evs=x.timed.map(ev=>{
      const top=ev.s/60*HOUR_H, h=Math.max(16,ev.dur/60*HOUR_H-2);
      const w=100/ev.lanes, left=ev.lane*w;
      return `<div class="tg-event ${ev.cf.cls}" data-path="${escA(ev.f.path)}" data-field="${ev.cf.field}"
        style="top:${top}px;height:${h}px;left:${left}%;width:calc(${w}% - 3px)"
        title="${esc(ev.cf.label)}: ${esc(ev.f.title||ev.f.name)} @ ${esc(ev.time)}">
        <div class="tg-rz tg-rz-top"></div>
        <span class="tg-ev-t">${esc(ev.time)}</span> ${esc(ev.f.title||ev.f.name)}
        <div class="tg-rz tg-rz-bot"></div></div>`;
    }).join('');
    const now=x.ds===todayStr?`<div class="tg-now" style="top:${nowMin/60*HOUR_H}px"></div>`:'';
    return `<div class="tg-col${x.ds===todayStr?' today':''}" data-date="${x.ds}">${lines}${now}${evs}</div>`;
  }).join('')+`</div>`;

  grid.innerHTML=`<div class="tg">${head}${allday}<div class="tg-scroll"><div class="tg-body">${axis}${cols}</div></div></div>`;
  tgDays=dd.map(x=>x.ds);
  wireTimeGrid();
  const sc=grid.querySelector('.tg-scroll');
  if(sc){
    // reserve the scrollbar width on the header / all-day rows so their columns line up with the body
    const sbw=sc.offsetWidth-sc.clientWidth;
    const head=grid.querySelector('.tg-head'), ad=grid.querySelector('.tg-allday');
    if(head) head.style.paddingRight=sbw+'px';
    if(ad) ad.style.paddingRight=sbw+'px';
    // keep the user's scroll position across re-renders; default to ~7 AM only on first open
    sc.scrollTop = (prevScroll!=null ? prevScroll : 7*HOUR_H);
  }
}

// Drag-to-move + resize for week/day events (Google-style, 15-min snap)
function wireTimeGrid(){
  document.querySelectorAll('#cal-grid .tg-event').forEach(el=>{
    el.addEventListener('pointerdown',e=>{
      const mode=e.target.classList.contains('tg-rz-top')?'top':
                 e.target.classList.contains('tg-rz-bot')?'bottom':'move';
      tgEventDown(e,el,mode);
    });
  });
}
let tgDrag=null;
function tgEventDown(e,el,mode){
  if(e.button!==0) return;
  e.preventDefault();
  const f=files.find(x=>x.path===el.dataset.path); if(!f) return;
  const cf=CAL_FIELDS.find(c=>c.field===el.dataset.field);
  const colsEl=document.getElementById('tg-cols'); if(!colsEl) return;
  tgDrag={
    el, f, cf, mode,
    origStart:timeToMin(f.data[cf.timeField]),
    origDur:(cf.durField&&parseInt(f.data[cf.durField],10))||60,
    startY:e.clientY,
    colsRect:colsEl.getBoundingClientRect(),
    nDays:tgDays.length,
    moved:false, cur:null,
  };
  el.classList.add('dragging');
  document.addEventListener('pointermove',tgPointerMove);
  document.addEventListener('pointerup',tgPointerUp,{once:true});
}
function tgPointerMove(e){
  const d=tgDrag; if(!d) return;
  const dMin=Math.round((e.clientY-d.startY)/HOUR_H*60/15)*15;   // snap to 15 minutes
  let start=d.origStart, dur=d.origDur;
  if(d.mode==='move') start=clampN(d.origStart+dMin,0,1440-15);
  else if(d.mode==='top'){ start=clampN(d.origStart+dMin,0,d.origStart+d.origDur-15); dur=d.origStart+d.origDur-start; }
  else { dur=clampN(d.origDur+dMin,15,1440-d.origStart); }   // bottom handle
  if(dMin!==0) d.moved=true;
  let dayIdx=null;
  if(d.mode==='move'&&d.nDays>1){
    const relX=e.clientX-d.colsRect.left;
    dayIdx=clampN(Math.floor(relX/(d.colsRect.width/d.nDays)),0,d.nDays-1);
    if(tgDays[dayIdx]!==d.f.data[d.cf.field]) d.moved=true;
  }
  d.cur={start,dur,dayIdx};
  d.el.style.top=(start/60*HOUR_H)+'px';
  d.el.style.height=Math.max(16,dur/60*HOUR_H-2)+'px';
  const tl=d.el.querySelector('.tg-ev-t'); if(tl) tl.textContent=minToTime(start);
  if(dayIdx!=null){
    const cols=document.querySelectorAll('#tg-cols .tg-col');
    if(cols[dayIdx]&&d.el.parentElement!==cols[dayIdx]){
      cols[dayIdx].appendChild(d.el);
      d.el.style.left='1px'; d.el.style.width='calc(100% - 3px)';
    }
  }
}
async function tgPointerUp(){
  const d=tgDrag; tgDrag=null;
  document.removeEventListener('pointermove',tgPointerMove);
  if(!d) return;
  d.el.classList.remove('dragging');
  if(!d.moved||!d.cur){ selectCard(d.f.path); return; }   // no real drag → treat as click
  const {start,dur,dayIdx}=d.cur;
  d.f.data[d.cf.timeField]=minToTime(start);
  if(d.cf.durField) d.f.data[d.cf.durField]=dur;
  if(d.mode==='move'&&dayIdx!=null&&tgDays[dayIdx]) d.f.data[d.cf.field]=tgDays[dayIdx];
  await writeFile(d.f);
  renderCalendar();
  toast(`${d.cf.label}: ${d.f.data[d.cf.field]} ${minToTime(start)} · ${dur}m`);
  pushToGoogle(d.f,d.cf);
}

function wireCalendarDnD(){
  document.querySelectorAll('#cal-grid .cal-chip').forEach(chip=>{
    chip.addEventListener('dragstart',e=>{
      chip.classList.add('dragging');
      e.dataTransfer.effectAllowed='move';
      e.dataTransfer.setData('text/plain',chip.dataset.path+'|'+chip.dataset.field);
    });
    chip.addEventListener('dragend',()=>chip.classList.remove('dragging'));
  });
  document.querySelectorAll('#cal-grid .cal-cell').forEach(cell=>{
    cell.addEventListener('dragover',e=>{ e.preventDefault(); cell.classList.add('drag-over'); });
    cell.addEventListener('dragleave',()=>cell.classList.remove('drag-over'));
    cell.addEventListener('drop',async e=>{
      e.preventDefault(); cell.classList.remove('drag-over');
      const [path,field]=(e.dataTransfer.getData('text/plain')||'').split('|');
      const newDate=cell.dataset.date;
      if(!path||!field||!newDate) return;
      const f=files.find(x=>x.path===path);
      if(!f||f.data[field]===newDate) return;
      const cf=CAL_FIELDS.find(c=>c.field===field);
      f.data[field]=newDate;
      await writeFile(f);
      renderCalendar();
      toast(`${cf.label} date → ${newDate}`);
      pushToGoogle(f,cf);
    });
  });
}

// Right-click a calendar event → context menu (Open / Delete), like Google Calendar.
function onCalContextMenu(e){
  const el=e.target.closest&&e.target.closest('[data-path][data-field]');
  if(!el) return;
  e.preventDefault();
  calContextMenu(e.clientX, e.clientY, el.dataset.path, el.dataset.field);
}
function closeCalMenu(){ const m=document.getElementById('cal-ctx-menu'); if(m){ if(m._onDoc) document.removeEventListener('mousedown',m._onDoc); m.remove(); } }
function calContextMenu(x,y,path,field){
  closeCalMenu();
  const f=files.find(z=>z.path===path);
  const cf=CAL_FIELDS.find(c=>c.field===field);
  if(!f||!cf) return;
  const menu=document.createElement('div');
  menu.id='cal-ctx-menu'; menu.className='cal-ctx-menu';
  menu.innerHTML=`<div class="cal-ctx-head">${esc(cf.label)}: ${esc(f.title||f.name)}</div>`+
    `<button class="cal-ctx-item open">Open file</button>`+
    `<button class="cal-ctx-item del">Delete event</button>`;
  document.body.appendChild(menu);
  menu.style.left=Math.min(x,window.innerWidth-menu.offsetWidth-8)+'px';
  menu.style.top=Math.min(y,window.innerHeight-menu.offsetHeight-8)+'px';
  menu.querySelector('.open').onclick=()=>{ closeCalMenu(); selectCard(path); };
  menu.querySelector('.del').onclick=()=>{ closeCalMenu(); calDeleteEvent(path,field); };
  // Close on a click/scroll outside the menu (must not pre-empt the menu's own button clicks)
  const onDoc=(ev)=>{
    if(menu.contains(ev.target)){ document.addEventListener('mousedown',onDoc,{once:true}); return; }
    closeCalMenu();
  };
  menu._onDoc=onDoc;
  setTimeout(()=>{
    document.addEventListener('mousedown',onDoc,{once:true});
    document.addEventListener('scroll',closeCalMenu,{once:true,capture:true});
  },0);
}
// Remove a single Film/Post event from this card and from Google Calendar.
async function calDeleteEvent(path,field){
  const f=files.find(z=>z.path===path); if(!f) return;
  const cf=CAL_FIELDS.find(c=>c.field===field); if(!cf) return;
  f.data[cf.field]=null;
  if(cf.timeField) f.data[cf.timeField]=null;
  if(cf.durField) f.data[cf.durField]=null;
  await writeFile(f);
  pushToGoogle(f,cf);            // date now empty → deletes the Google event
  renderCalendar();
  if(typeof bodyOpen!=='undefined' && bodyOpen && selPath===path) renderInspector(f);
  toast(`${cf.label} event deleted: ${f.title||f.name}`);
}

// One-way push: Content OS card date/time -> Google event (all-day or timed).
// Serialized per card+field so rapid edits (e.g. set date then time) can't double-create.
const _pushLocks={};
function pushToGoogle(f,cf){
  const key=f.path+'::'+cf.idKey;
  const prev=_pushLocks[key]||Promise.resolve();
  const next=prev.catch(()=>{}).then(()=>pushToGoogleInner(f,cf));
  _pushLocks[key]=next;
  next.finally(()=>{ if(_pushLocks[key]===next) delete _pushLocks[key]; });
  return next;
}
async function pushToGoogleInner(f,cf){
  const date=f.data[cf.field];
  const time=cf.timeField?f.data[cf.timeField]:null;
  const existingId=f.data[cf.idKey];
  try{
    if(!date){
      if(existingId){
        await fetch(`${GC_API}/api/events/${existingId}`,{method:'DELETE'});
        f.data[cf.idKey]=null; await writeFile(f);
      }
      return;
    }
    const tz=Intl.DateTimeFormat().resolvedOptions().timeZone||'UTC';
    const body={ summary:`[${cf.label}] ${f.title||f.name}`, description:f.path, colorId:cf.colorId };
    if(time){
      const dur=cf.durField?(parseInt(f.data[cf.durField],10)||60):60;
      const {startISO,endISO}=timedRange(date,time,dur);
      body.start={dateTime:startISO,timeZone:tz};
      body.end={dateTime:endISO,timeZone:tz};
    } else {
      body.start={date}; body.end={date:addDays(date,1)};
    }
    if(existingId){
      const r=await fetch(`${GC_API}/api/events/${existingId}`,{
        method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
      if(!r.ok){
        // Update failed — either the event was deleted in Google, or Google rejected an
        // all-day<->timed switch. Delete the old one first (no-op if already gone) so we
        // never leave a duplicate, then create a fresh event.
        try{ await fetch(`${GC_API}/api/events/${existingId}`,{method:'DELETE'}); }catch(e){}
        f.data[cf.idKey]=null; await writeFile(f);
        const r2=await fetch(`${GC_API}/api/events`,{
          method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
        if(!r2.ok) throw new Error('recreate '+r2.status);
        const ev2=await r2.json();
        if(ev2&&ev2.id){ f.data[cf.idKey]=ev2.id; await writeFile(f); }
      }
    } else {
      const r=await fetch(`${GC_API}/api/events`,{
        method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
      if(!r.ok) throw new Error('create '+r.status);
      const ev=await r.json();
      if(ev&&ev.id){ f.data[cf.idKey]=ev.id; await writeFile(f); }
    }
  }catch(e){
    toast('Google sync failed: '+e.message,true);
  }
}

// Convert a Google event's start/end into our local {date, time, dur} fields.
// All-day events → date only; timed events → local date + HH:mm + duration in minutes.
function gcalEventToFields(ev){
  const s=ev&&ev.start; if(!s) return null;
  if(s.date) return {date:s.date, time:null, dur:null};            // all-day
  if(s.dateTime){
    const sd=new Date(s.dateTime);
    let dur=null;
    if(ev.end&&ev.end.dateTime) dur=Math.round((new Date(ev.end.dateTime)-sd)/60000)||null;
    return {date:ymd(sd), time:pad2(sd.getHours())+':'+pad2(sd.getMinutes()), dur};
  }
  return null;
}

// Pull changes back from Google: clear schedules whose event was deleted, and pull
// back any reschedule/move done directly in Google Calendar.
async function syncFromGoogle(){
  let changed=false;
  for(const f of files){
    for(const cf of CAL_FIELDS){
      const id=f.data&&f.data[cf.idKey];
      if(!id) continue;
      try{
        const r=await fetch(`${GC_API}/api/events/${id}`);
        let gone=false, ev=null;
        if(r.status===404||r.status===410) gone=true;
        else if(r.ok){ ev=await r.json(); if(ev&&ev.status==='cancelled') gone=true; }
        if(gone){
          f.data[cf.field]=null; f.data[cf.timeField]=null;
          if(cf.durField) f.data[cf.durField]=null; f.data[cf.idKey]=null;
          await writeFile(f); changed=true;
        } else if(ev){
          // Event still exists — mirror any move/reschedule made in Google back here.
          const g=gcalEventToFields(ev);
          if(g){
            let diff=false;
            if((f.data[cf.field]||null)!==(g.date||null)){ f.data[cf.field]=g.date||null; diff=true; }
            if(cf.timeField && (f.data[cf.timeField]||null)!==(g.time||null)){ f.data[cf.timeField]=g.time||null; diff=true; }
            if(cf.durField && g.dur){
              const cur=parseInt(f.data[cf.durField],10)||60;
              if(g.dur!==cur){ f.data[cf.durField]=String(g.dur); diff=true; }
            }
            if(diff){ await writeFile(f); changed=true; }
          }
        }
      }catch(e){ /* network hiccup — leave as-is */ }
    }
  }
  if(changed){
    if(curView==='calendar') renderCalendar();
    // If the file editor is open on a card that just changed, refresh its date/time inputs
    if(typeof bodyOpen!=='undefined' && bodyOpen && selPath){
      const sf=files.find(x=>x.path===selPath);
      if(sf) renderInspector(sf);
    }
  }
}

// Remove a card's Google events (called when the card is deleted)

// Server mode
async function loadFiles() {
  document.getElementById('kanban').innerHTML=
    '<div class="loading"><div class="spin"></div><span>Loading...</span></div>';
  try {
    const res=await fetch('/api/scan?t='+Date.now(),{cache:'no-store'});
    const data=await res.json();
    if(data && data.needsVault){
      document.getElementById('kanban').innerHTML=
        '<div class="loading"><span>Choose your Content OS folder to begin…</span></div>';
      return chooseVault();
    }
    files=data.map(enrich);
    updateVaultButton();
    updateCounts();
    renderKanban();
    refreshView();
  } catch(e) {
    document.getElementById('kanban').innerHTML=
      `<div class="loading" style="color:#fca5a5">Server not reachable.<br><small>${e.message}</small></div>`;
  }
}

async function apiWrite(filePath,content) {
  const res=await fetch('/api/write',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({filePath,content})});
  const j=await res.json();
  if(!j.ok) throw new Error(j.error);
}
async function apiCreate(filePath,content) {
  const res=await fetch('/api/create',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({filePath,content})});
  const j=await res.json();
  if(!j.ok) throw new Error(j.error||'Failed');
}
async function apiDelete(filePath) {
  const res=await fetch('/api/delete',{method:'DELETE',headers:{'Content-Type':'application/json'},body:JSON.stringify({filePath})});
  if(res.status===404) throw new Error('Delete endpoint not found');
  const j=await res.json();
  if(!j.ok) throw new Error(j.error||'Failed');
}
async function createLocalFile(filePath,content) {
  if(!rootHandle) throw new Error('Open the Content OS folder first');
  const parts=filePath.split('/').filter(Boolean);
  const fileName=parts.pop();
  let dir=rootHandle;
  for(const part of parts) dir=await dir.getDirectoryHandle(part,{create:true});
  const handle=await dir.getFileHandle(fileName,{create:true});
  const w=await handle.createWritable();
  await w.write(content);
  await w.close();
  return handle;
}
async function createFileAt(filePath,content) {
  if(IS_SERVER){ await apiCreate(filePath,content); return null; }
  return createLocalFile(filePath,content);
}
async function removeLocalFile(filePath) {
  if(!rootHandle) return;
  const parts=filePath.split('/').filter(Boolean);
  const fileName=parts.pop();
  let dir=rootHandle;
  for(const part of parts) dir=await dir.getDirectoryHandle(part);
  await dir.removeEntry(fileName);
}

// File mode
async function openVault() {
  try {
    rootHandle=await window.showDirectoryPicker({mode:'readwrite'});
    document.getElementById('landing').style.display='none';
    document.getElementById('main').classList.add('visible');
    document.getElementById('kanban').innerHTML=
      '<div class="loading"><div class="spin"></div><span id="scan-msg">Scanning...</span></div>';
    files=[];
    await scanDir(rootHandle,'');
    updateCounts();
    renderKanban();
    refreshView();
  } catch(e){ if(e.name!=='AbortError') alert('Error: '+e.message); }
}
async function scanDir(dir,path) {
  for await (const [name,handle] of dir.entries()) {
    if(name.startsWith('.')||['server.js','start.command','content-os.html'].includes(name)) continue;
    const full=path?`${path}/${name}`:name;
    if(handle.kind==='directory'){ await scanDir(handle,full); }
    else if(name.endsWith('.md')) {
      try {
        const file=await handle.getFile(), text=await file.text();
        const {data,body}=parseFM(text);
        files.push(enrich({name,path:full,handle,data,body,content:text}));
      } catch{}
    }
  }
}

async function writeFile(f) {
  const content=writeFM(f.data,f.body);
  try {
    if(IS_SERVER){ await apiWrite(f.path,content); }
    else { const w=await f.handle.createWritable(); await w.write(content); await w.close(); }
    f.content=content; return true;
  } catch(e){ toast('Write error: '+e.message,true); return false; }
}
function fileSlug(f) {
  return toSlug(f.title||f.name.replace(/\.md$/,''));
}
function pathForFile(f,status=f.status) {
  return buildFilePath(f.account||'traceback',f.format||'short-form',fileSlug(f),status,f.rtype||modalResearchBucket);
}
function fileNameStem(name) {
  return String(name||'').replace(/\.md$/i,'');
}
function safeMarkdownFileName(value) {
  const stem=String(value||'').trim()
    .replace(/[\\/:*?"<>|]/g,'-')
    .replace(/\s+/g,' ')
    .replace(/-+/g,'-')
    .trim();
  return stem?`${stem}.md`:'';
}
function parentDir(path) {
  const parts=String(path||'').split('/');
  parts.pop();
  return parts.join('/');
}
