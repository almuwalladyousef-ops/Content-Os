function filtered() {
  return files.filter(f=>{
    if(!isContent(f)) return false;
    if(f.status==='archive') return false;
    if(accFilter!=='all'&&f.account!==accFilter) return false;
    if(fmtFilter!=='all'&&f.format!==fmtFilter)  return false;
    if(searchQuery&&!(f.title+' '+(f.data.summary||'')+' '+f.body).toLowerCase().includes(searchQuery)) return false;
    return true;
  });
}

// Kanban
function renderKanban() {
  const byStatus={};
  FLOW.forEach(s=>byStatus[s.key]=[]);
  filtered().forEach(f=>{ const s=f.status||'research'; (byStatus[s]||byStatus['research']).push(f); });
  const kb=document.getElementById('kanban');
  kb.innerHTML='';
  FLOW.forEach(({key,label,color})=>{
    if(key==='research'||key==='archive') return;
    const cards=byStatus[key]||[];
    const col=document.createElement('div');
    col.className='col'; col.dataset.status=key;
    col.ondragover=e=>{e.preventDefault();col.classList.add('drag-over');};
    col.ondragleave=()=>col.classList.remove('drag-over');
    col.ondrop=async e=>{e.preventDefault();col.classList.remove('drag-over');if(dragPath)await moveCard(dragPath,key);};
    col.innerHTML=`<div class="col-head"><span class="col-dot" style="background:${color};box-shadow:0 0 6px ${color}55"></span><span class="col-name">${label}</span><span class="col-n">${cards.length}</span></div><div class="cards" id="col-${key}"></div><button class="drop-hint" onclick="quickAdd('${key}')">+ Create in ${label}</button>`;
    kb.appendChild(col);
    const cont=col.querySelector('.cards');
    cards.forEach(f=>cont.appendChild(makeCard(f)));
  });
}

function hl(text,q) {
  if(!q) return esc(text);
  const idx=text.toLowerCase().indexOf(q);
  if(idx<0) return esc(text);
  return esc(text.slice(0,idx))+`<mark style="background:#3a3a00;color:#fde68a;border-radius:2px;">${esc(text.slice(idx,idx+q.length))}</mark>`+esc(text.slice(idx+q.length));
}

function makeCard(f) {
  const d=document.createElement('div');
  d.className='card'+(f.path===selPath?' on':''); d.draggable=true; d.dataset.path=f.path;
  const accTag=f.account?`<span class="tag tag-${f.account}">${accountLabel(f.account)}</span>`:'';
  const fmtTag=f.format?`<span class="tag tag-fmt">${formatLabel(f.format)}</span>`:'';
  d.innerHTML=`<div class="card-title">${hl(f.title,searchQuery)}</div><div class="tags">${accTag}${fmtTag}</div>`;
  d.onclick=()=>selectCard(f.path);
  d.ondragstart=e=>{dragPath=f.path;d.classList.add('dragging');e.dataTransfer.effectAllowed='move';};
  d.ondragend=()=>{dragPath=null;d.classList.remove('dragging');};
  return d;
}

async function moveCard(path,newStatus) {
  const f=files.find(x=>x.path===path);
  if(!f||(!IS_SERVER&&!f.handle)){toast('Read-only');return;}
  if(f.status===newStatus) return;
  const oldStatus=f.status, oldPath=f.path, oldHandle=f.handle;
  const previousGraphLinks=newStatus==='archive'?graphLinksFor(f):[];
  f.status=newStatus; f.data.status=newStatus;
  f.rtype=null;
  const newPath=pathForFile(f,newStatus);
  const content=writeFM(f.data,withGraphLinks(f.body,f,previousGraphLinks));
  try {
    const handle=await createFileAt(newPath,content);
    if(IS_SERVER&&oldPath!==newPath) {
      await apiDelete(oldPath);
    }
    if(!IS_SERVER&&oldPath!==newPath) {
      try { await removeLocalFile(oldPath); } catch(e) {}
    }
    f.path=newPath;
    f.name=newPath.split('/').pop();
    f.handle=handle||oldHandle;
    f.content=content;
    f.body=parseFM(content).body;
    selPath=newPath;
    toast(`Moved to ${FLOW_MAP[newStatus]?.label||newStatus}`);
    updateCounts();
    refreshView();
    renderInspector(f);
    if(IS_SERVER) loadFiles();
  } catch(e) {
    f.status=oldStatus; f.data.status=oldStatus; f.path=oldPath; f.handle=oldHandle;
    toast('Move error: '+e.message,true);
  }
}

    if(searchQuery&&!(f.title+' '+(f.data.summary||'')+' '+f.body+' '+f.name).toLowerCase().includes(searchQuery)) return false;
    return true;
  });
  wrap.innerHTML='';
  const desk=document.createElement('div');
  desk.className='research-desk';
  const followItems=allResearch.filter(f=>f.rtype==='accounts');
  desk.innerHTML=`
    <section class="research-follow">
      <div class="research-follow-head">

          <div class="research-follow-title">Accounts</div>
          <div class="research-bucket-count">${followItems.length}</div>

    </section>

  const buckets=desk.querySelector('.research-buckets');
  RESEARCH_BUCKETS.forEach(({key,label,purpose})=>{

    const bucket=document.createElement('section');
    bucket.className=`research-bucket research-${key}`;
    bucket.innerHTML=`
      <div class="research-bucket-head">

          <div class="research-bucket-name">${label}</div>
          <div class="research-bucket-count">${items.length}</div>
        </div>
      </div>
      <div class="research-stream" id="research-${key}"></div>
      <button class="research-add" onclick="quickResearch('${key}')">+ Add ${label}</button>`;
    buckets.appendChild(bucket);
    const cont=bucket.querySelector('.research-stream');

      cont.innerHTML=`<div class="research-empty">No ${label.toLowerCase()} research for this account.</div>`;
    } else {

    }
  });

  if(isHubFile(f)) return false;
  return isResearch(f)||f.status==='research';
}

function editorFileRailHTML(activePath) {
  const visible=files
    .filter(f=>!isHubFile(f))
    .filter(f=>isContent(f)||isResearchItem(f)||f.status==='archive')
    .sort((a,b)=>{
      const ao=a.status==='archive'?2:isResearchItem(a)?0:1;
      const bo=b.status==='archive'?2:isResearchItem(b)?0:1;
      return ao-bo||String(a.title).localeCompare(String(b.title));
    });
  const rows=visible.map(f=>{
    const status=f.status||'research';
    const color=(FLOW_MAP[status]||FLOW[0]).color;
    const label=isResearchItem(f)?researchTypeLabel(f.rtype):(FLOW_MAP[status]?.label||status);
    const meta=[label, f.account?accountLabel(f.account):'', f.format?formatLabel(f.format):''].filter(Boolean).join(' / ');
    return `<button class="editor-file-row ${f.path===activePath?'on':''}" data-editor-file-row data-title="${esc((f.title+' '+f.name+' '+f.path).toLowerCase())}" onclick="selectCard('${escA(f.path)}')">
      <span class="editor-file-dot" style="background:${color}"></span>
      <span>
        <span class="editor-file-name">${esc(f.title||f.name)}</span>
        <span class="editor-file-meta">${esc(meta||f.name)}</span>
      </span>
    </button>`;
  }).join('');
  return `<aside class="editor-file-rail">
    <div class="editor-rail-head">
      <div class="editor-rail-title">Files</div>
      <div class="editor-rail-count">${visible.length} editable files</div>
    </div>
    <div class="editor-rail-search">
      <input type="search" placeholder="Find a file..." oninput="filterEditorRail(this.value)">
    </div>
    <div class="editor-file-list">${rows||'<div class="empty-list">No files found.</div>'}</div>
  </aside>`;
}

function filterEditorRail(value) {
  const q=String(value||'').trim().toLowerCase();
  document.querySelectorAll('[data-editor-file-row]').forEach(row=>{
    row.style.display=!q||row.dataset.title.includes(q)?'grid':'none';
  });
}

function renderInspector(f) {
  const isRes=isResearch(f);
  document.getElementById('to-script-panel').style.display=isRes?'block':'none';

  const status=f.status||'research';
  const si=FLOW_MAP[status]||FLOW[0];
  const nextKey=NEXT[status], nextSI=nextKey?FLOW_MAP[nextKey]:null;
  const curIdx=FLOW.findIndex(s=>s.key===status);

  const flowHTML=FLOW.filter(s=>s.key!=='archive').map(s=>{
    const idx=FLOW.indexOf(s);
    let cls,dc;
    if(idx<curIdx){cls='done';dc='done';}
    else if(idx===curIdx){cls='cur';dc='cur';}
    else if(idx===curIdx+1){cls='nxt-s';dc='nxt-s';}
    else{cls='todo';dc='todo';}
    return `<div class="fstep ${cls}"><span class="fdot ${dc}"></span>${s.label}</div>`;
  }).join('');

  const META=['account_name','account_link','account_for','account','format','platform','source','proof'];
  const metaHTML=META.filter(k=>f.data[k]&&f.data[k]!=='null').map(k=>`<div class="meta-row"><span class="meta-k">${k}</span><span class="meta-v">${esc(f.data[k])}</span></div>`).join('');

  const showFilmDate=['script','ready-to-film','film-today','filmed'].includes(status);
  const showPostDate=['ready-to-post','posted'].includes(status);
  const filmHTML=showFilmDate?`<div class="isect"><div class="ilbl">Film Date</div><div class="date-field"><input class="date-input" type="date" id="film-date-input" value="${f.data.film_date||''}" onchange="saveDate('${escA(f.path)}','film_date',this.value)"><button class="date-save" onclick="saveDate('${escA(f.path)}','film_date',document.getElementById('film-date-input').value)">Set</button></div></div>`:'';
  const postHTML=showPostDate?`<div class="isect"><div class="ilbl">Post Date</div><div class="date-field"><input class="date-input" type="date" id="post-date-input" value="${f.data.post_date||''}" onchange="saveDate('${escA(f.path)}','post_date',this.value)"><button class="date-save" onclick="saveDate('${escA(f.path)}','post_date',document.getElementById('post-date-input').value)">Set</button></div></div>`:'';

  const canWrite=IS_SERVER||!!f.handle;
  let btns='';
  if(!isRes&&nextSI&&canWrite) btns+=`<button class="btn btn-p" onclick="moveCard('${escA(f.path)}','${nextKey}')">Move to ${nextSI.label}</button>`;
  btns+=`<button class="btn btn-s" onclick="openObs('${escA(f.path)}')">Open in Obsidian</button>`;
  if(!isRes&&status!=='archive'&&canWrite) btns+=`<button class="btn btn-d" onclick="moveCard('${escA(f.path)}','archive')">Archive File</button>`;
  if(!isRes&&status==='archive'&&canWrite) btns+=`<button class="btn btn-p" onclick="moveCard('${escA(f.path)}','script')">Restore to Script</button>`;

  const accountOptions=['traceback','personal-ai','motivational'].map(v=>`<option value="${v}" ${f.account===v?'selected':''}>${accountLabel(v)}</option>`).join('');
  const formatOptions=['short-form','long-form','x','carousel','story'].map(v=>`<option value="${v}" ${f.format===v?'selected':''}>${formatLabel(v)}</option>`).join('');

// Custom time dropdown (native <input type=time> picker doesn't open in this build).
function fmt12(m){ let h=Math.floor(m/60), mm=m%60; const ap=h<12?'AM':'PM'; let hr=h%12; if(hr===0)hr=12; return hr+':'+String(mm).padStart(2,'0')+' '+ap; }
function closeTimeDD(){ const d=document.getElementById('time-dd'); if(d){ if(d._onDoc) document.removeEventListener('mousedown',d._onDoc,true); d.remove(); } }
function openTimeDD(input){
  if(document.getElementById('time-dd')){ closeTimeDD(); return; }   // toggle off if already open
  const dd=document.createElement('div');
  dd.id='time-dd'; dd.className='time-dd';
  const cur=input.value;
  let html='';
  for(let m=0;m<1440;m+=60){      // hourly options (display only — any HH:MM value still saves/syncs fine)
    const val=String(Math.floor(m/60)).padStart(2,'0')+':'+String(m%60).padStart(2,'0');
    html+=`<button type="button" data-val="${val}" class="${val===cur?'sel':''}">${fmt12(m)}</button>`;
  }
  dd.innerHTML=html;
  document.body.appendChild(dd);
  const r=input.getBoundingClientRect();
  let top=r.bottom+4; if(top+240>window.innerHeight) top=Math.max(8,r.top-244);
  let left=r.left; if(left+dd.offsetWidth>window.innerWidth-8) left=window.innerWidth-dd.offsetWidth-8;
  dd.style.top=top+'px'; dd.style.left=Math.max(8,left)+'px';
  const sel=dd.querySelector('button.sel'); if(sel) sel.scrollIntoView({block:'center'});
  dd.addEventListener('mousedown',ev=>{
    const b=ev.target.closest('button[data-val]'); if(!b) return;
    ev.preventDefault();
    input.value=b.dataset.val;
    dtMark(input);
    input.dispatchEvent(new Event('change',{bubbles:true}));   // runs editorSetDate → saves + syncs
    closeTimeDD();
  });
  const onDoc=ev=>{ if(dd.contains(ev.target)||ev.target===input) return; closeTimeDD(); };
  dd._onDoc=onDoc;
  setTimeout(()=>document.addEventListener('mousedown',onDoc,true),0);
}

// Custom date dropdown — a mini month calendar, same style as the time dropdown.
function closeDateDD(){ const d=document.getElementById('date-dd'); if(d){ if(d._onDoc) document.removeEventListener('mousedown',d._onDoc,true); d.remove(); } }
function openDateDD(input){
  if(document.getElementById('date-dd')){ closeDateDD(); return; }   // toggle off
  const dd=document.createElement('div');
  dd.id='date-dd'; dd.className='date-dd';
  const cur=input.value;                                     // YYYY-MM-DD or ''
  const base=cur?new Date(cur+'T00:00:00'):new Date();
  const view={y:base.getFullYear(), m:base.getMonth()};
  const todayStr=ymd(new Date());
  function render(){
    const first=new Date(view.y,view.m,1);
    const start=new Date(view.y,view.m,1-first.getDay());
    const dows=['S','M','T','W','T','F','S'].map(x=>`<span class="dd-dow">${x}</span>`).join('');
    let cells='';
    for(let i=0;i<42;i++){
      const d=new Date(start.getFullYear(),start.getMonth(),start.getDate()+i);
      const ds=ymd(d);
      cells+=`<button type="button" class="dd-day${d.getMonth()!==view.m?' out':''}${ds===cur?' sel':''}${ds===todayStr?' today':''}" data-val="${ds}">${d.getDate()}</button>`;
    }
    dd.innerHTML=`<div class="dd-head"><button type="button" class="dd-nav" data-nav="-1">‹</button>`+
      `<span class="dd-mon">${first.toLocaleDateString('en-US',{month:'long',year:'numeric'})}</span>`+
      `<button type="button" class="dd-nav" data-nav="1">›</button></div><div class="dd-grid">${dows}${cells}</div>`;
  }
  render();
  document.body.appendChild(dd);
  const r=input.getBoundingClientRect();
  let top=r.bottom+4; if(top+dd.offsetHeight>window.innerHeight-8) top=Math.max(8,r.top-dd.offsetHeight-4);
  let left=r.left; if(left+dd.offsetWidth>window.innerWidth-8) left=window.innerWidth-dd.offsetWidth-8;
  dd.style.top=top+'px'; dd.style.left=Math.max(8,left)+'px';
  dd.addEventListener('mousedown',ev=>{
    const nav=ev.target.closest('[data-nav]');
    if(nav){ ev.preventDefault(); view.m+=parseInt(nav.dataset.nav,10);
      if(view.m<0){ view.m=11; view.y--; } if(view.m>11){ view.m=0; view.y++; } render(); return; }
    const day=ev.target.closest('[data-val]');
    if(day){ ev.preventDefault(); input.value=day.dataset.val; dtMark(input);
      input.dispatchEvent(new Event('change',{bubbles:true})); closeDateDD(); }
  });
  const onDoc=ev=>{ if(dd.contains(ev.target)||ev.target===input) return; closeDateDD(); };
  dd._onDoc=onDoc;
  setTimeout(()=>document.addEventListener('mousedown',onDoc,true),0);
}

async function deleteFileFromEditor(path) {
  const f=files.find(x=>x.path===path);
  if(!f) return;
  const label=f.title||f.name||path;
  if(!confirm(`Delete this file permanently?\n\n${label}`)) return;
  try {
    await deleteGoogleEventsFor(f);   // remove its Google Calendar events too
    if(IS_SERVER) {
      await apiDelete(path);
    } else {
      await removeLocalFile(path);
    }
    files=files.filter(x=>x.path!==path);
    if(selPath===path) selPath=null;
    document.getElementById('insp').classList.remove('open');
    document.getElementById('to-script-panel').style.display='none';
    updateCounts();
    renderKanban();
    refreshView();
    toast(`Deleted: ${label}`);
    if(IS_SERVER) loadFiles();
  } catch(e) {
    toast('Delete error: '+e.message,true);
  }
}

async function saveBody(path) {
  const f=files.find(x=>x.path===path); if(!f) return;
  const editor=document.getElementById('rich-editor'); if(!editor) return;
  const oldPath=f.path, oldHandle=f.handle, oldName=f.name, oldTitle=f.title;
  const fileName=safeMarkdownFileName(document.getElementById('editor-title')?.value);
  if(!fileName){ toast('File name cannot be empty',true); return; }
  const account=document.getElementById('editor-account')?.value;
  const format=document.getElementById('editor-format')?.value;
  const source=document.getElementById('editor-source')?.value.trim();
  const proof=document.getElementById('editor-proof')?.value.trim();
  if(account){ f.account=account; f.data.account=account; }
  if(format){ f.format=format; f.data.format=format; }
  delete f.data.priority;
  f.data.source=source||null;
  f.data.proof=proof||null;
  applyExtraFrontmatter(f.data,document.getElementById('editor-extra-fm')?.value||'');
  const graphLines=graphLinksFor(f);
  f.body=withCustomGraphLinks(fillConnectedToLinks(htmlToMarkdown(editor),graphLines),graphLines);
  const folderPath=parentDir(pathForFile(f,f.status));
  const newPath=folderPath?`${folderPath}/${fileName}`:fileName;
  const content=writeFM(f.data,f.body);
  try {
    if(newPath!==oldPath) {
      const handle=await createFileAt(newPath,content);
      if(IS_SERVER) await apiDelete(oldPath);
      else { try { await removeLocalFile(oldPath); } catch(e) {} }
      f.path=newPath;
      f.name=fileName;
      f.handle=handle||oldHandle;
      selPath=newPath;
    } else if(IS_SERVER) {
      await apiWrite(f.path,content);
    } else {
      const w=await f.handle.createWritable();
      await w.write(content);
      await w.close();
    }
    f.title=getTitle(f.name,f.body,f.data);
    f.content=content;
    toast(newPath!==oldPath?'File renamed':'File saved');
    updateCounts();
    renderKanban();
    refreshView();
    renderInspector(f);
    if(IS_SERVER&&newPath!==oldPath) loadFiles();
  } catch(e) {
    f.path=oldPath; f.handle=oldHandle; f.name=oldName; f.title=oldTitle; f.data.summary=oldTitle;
    toast('Save error: '+e.message,true);
  }
}

function markdownToPreview(md) {
  const lines=md.split('\n');
  let html='', inList=false;
  const closeList=()=>{ if(inList){ html+='</ul>'; inList=false; } };
  lines.forEach(line=>{
    const raw=line.trimEnd();
    if(!raw.trim()){ closeList(); html+='<p class="preview-space"></p>'; return; }
    if(/^###\s+/.test(raw)){ closeList(); html+=`<h3>${inlineMd(raw.replace(/^###\s+/,''))}</h3>`; return; }
    if(/^##\s+/.test(raw)){ closeList(); html+=`<h2>${inlineMd(raw.replace(/^##\s+/,''))}</h2>`; return; }
    if(/^#\s+/.test(raw)){ closeList(); html+=`<h1>${inlineMd(raw.replace(/^#\s+/,''))}</h1>`; return; }
    if(/^>\s+/.test(raw)){ closeList(); html+=`<blockquote>${inlineMd(raw.replace(/^>\s+/,''))}</blockquote>`; return; }
    if(/^- \[.\]\s+/.test(raw)){
      if(!inList){ html+='<ul>'; inList=true; }
      const checked=/^- \[[xX]\]\s+/.test(raw);
      html+=`<li class="todo-item" data-checked="${checked?'true':'false'}"><span class="check-toggle ${checked?'checked':''}"></span>${inlineMd(raw.replace(/^- \[.\]\s+/,''))}</li>`;
      return;
    }
    if(/^(-|\*)\s+/.test(raw)||/^\d+\.\s+/.test(raw)){
      if(!inList){ html+='<ul>'; inList=true; }
      html+=`<li>${inlineMd(raw.replace(/^(-|\*)\s+|^\d+\.\s+|^- \[.\]\s+/,''))}</li>`;
      return;
    }
    closeList();
    html+=`<p>${inlineMd(raw)}</p>`;
  });
  closeList();
  return html;
}
function inlineMd(text) {
  return esc(text)
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/\[\[(.+?)\]\]/g,'<span class="preview-wiki">$1</span>')
    .replace(/\[(.+?)\]\((.+?)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
}
function htmlToMarkdown(root) {
  const out=[];
  const inline=node=>{
    if(node.nodeType===Node.TEXT_NODE) return node.textContent.replace(/\s+/g,' ');
    if(node.nodeType!==Node.ELEMENT_NODE) return '';
    const tag=node.tagName.toLowerCase();
    if(node.classList.contains('check-toggle')) return '';
    const text=[...node.childNodes].map(inline).join('');
    if(tag==='strong'||tag==='b') return `**${text}**`;
    if(tag==='em'||tag==='i') return `*${text}*`;
    if(tag==='a') return `[${text}](${node.getAttribute('href')||''})`;
    if(tag==='br') return '\n';
    if(node.classList.contains('preview-wiki')) return `[[${text}]]`;
    if(node.classList.contains('preview-link')) return text;
    return text;
  };
  const block=node=>{
    if(node.nodeType===Node.TEXT_NODE) {
      const text=node.textContent.trim();
      if(text) out.push(text);
      return;
    }
    if(node.nodeType!==Node.ELEMENT_NODE) return;
    const tag=node.tagName.toLowerCase();
    if(tag==='h1') {
      const text=inline(node).trim();
      if(text) out.push(`# ${text}`);
    }
    else if(tag==='h2') {
      const text=inline(node).trim();
      if(text) out.push(`## ${text}`);
    }
    else if(tag==='h3') {
      const text=inline(node).trim();
      if(text) out.push(`### ${text}`);
    }
    else if(tag==='blockquote') {
      const text=inline(node).trim();
      if(text) out.push(`> ${text}`);
    }
    else if(tag==='ul') [...node.children].forEach(li=>{
      const text=inline(li).trim();
      if(text) out.push(li.classList.contains('todo-item')?`- [${li.dataset.checked==='true'?'x':' '}] ${text}`:`- ${text}`);
    });
    else if(tag==='ol') [...node.children].forEach((li,i)=>{
      const text=inline(li).trim();
      if(text) out.push(`${i+1}. ${text}`);
    });
    else if(tag==='hr') out.push('---');
    else if(tag==='div'||tag==='p') {
      const text=inline(node).trim();
      if(text) out.push(text);
    } else {
      [...node.childNodes].forEach(block);
    }
  };
  [...root.childNodes].forEach(block);
  return out.join('\n\n').replace(/\n{3,}/g,'\n\n').trim();
}

  const reserved=new Set(['node_type','summary','account','format','status','priority','source','proof','film_date','post_date','film_time','post_time','film_dur','post_dur','gcal_film_id','gcal_post_id']);
  return Object.entries(data)
    .filter(([k,v])=>!reserved.has(k)&&v!=null&&v!=='')
    .map(([k,v])=>`${k}: ${v}`)
    .join('\n');
}
function applyExtraFrontmatter(data,text) {
  const reserved=new Set(['node_type','summary','account','format','status','priority','source','proof','film_date','post_date','film_time','post_time','film_dur','post_dur','gcal_film_id','gcal_post_id']);
  Object.keys(data).forEach(k=>{ if(!reserved.has(k)) delete data[k]; });
  text.split('\n').forEach(line=>{
    const ci=line.indexOf(':');
    if(ci<1) return;
    const key=line.slice(0,ci).trim();
    if(!key||reserved.has(key)) return;
    const val=line.slice(ci+1).trim();
    data[key]=val||null;
  });
}

function buildFilePath(account,format,slug,status,bucket=modalResearchBucket) {
  if(status==='research') {
    const bucketFolder={accounts:'00 Accounts',daily:'01 Daily Topics',reels:'02 Reels',weekly:'03 Weekly',urgent:'04 Urgent'}[bucket]||'01 Daily Topics';
    if(bucketFolder==='00 Accounts') return `01 Research/00 Accounts/${slug}.md`;
    return `01 Research/${bucketFolder}/${slug}.md`;
  }
  if(status==='archive') return `04 Archive/(C) ${slug}.md`;
  if(status==='script') return `03 Board/00 Script/(C) ${slug}.md`;
  const boardFolder={script:'00 Script','ready-to-film':'01 Ready to Film','film-today':'02 Film Today',filmed:'03 Filmed','ready-to-post':'04 Ready to Post',posted:'05 Posted'}[status];
  if(boardFolder) return `03 Board/${boardFolder}/(C) ${slug}.md`;
  return `03 Board/00 Script/(C) ${slug}.md`;
}
function toSlug(t){ return t.toLowerCase().replace(/[^a-z0-9\s-]/g,'').replace(/\s+/g,'-').replace(/-+/g,'-').trim().slice(0,60); }
function selectedAccountFor() {
  return [...document.querySelectorAll('.nf-account-for:checked')].map(cb=>cb.value);
}
function accountLabel(key) {
  return (ACCOUNT_META.find(a=>a.key===key)?.label)||key;
}
function brandBrainLink(key) {
  const target=BRAND_BRAIN[key]||accountLabel(key);
  return `[[${target}|${accountLabel(key)}]]`;
}
function wiki(target,label) {
  return `[[${target}|${label}]]`;
}
function formatLabel(key) {
  return ({'short-form':'Short Form','long-form':'Long Form',x:'X',carousel:'Carousels',story:'Stories'}[key])||key||'Format';
}
function statusLabel(key) {
  return (FLOW_MAP[key]?.label)||key||'Status';
}
function graphLinksFor(f) {
  const links=[wiki(CONTENT_OS_HUB,'Content OS')];
  if(f.account) links.push(brandBrainLink(f.account));
  if(f.format&&FORMAT_HUB[f.format]) links.push(wiki(FORMAT_HUB[f.format],formatLabel(f.format)));
  if(f.status==='research'&&f.rtype&&RESEARCH_HUB[f.rtype]) links.push(wiki(RESEARCH_HUB[f.rtype],researchTypeLabel(f.rtype)));
  else if(f.status&&STATUS_HUB[f.status]) links.push(wiki(STATUS_HUB[f.status],statusLabel(f.status)));
  return [...new Set(links)];
}
function connectedBlockFor(f) {
  return graphLinksFor(f).map(link=>`- ${link}`).join('\n');
}
function fillConnectedTo(body,f) {
  const connected=connectedBlockFor(f);
  if(!connected) return body;
  if(/## Connected To\n/.test(body)) {
    return body.replace(/## Connected To\n[\s\S]*?(?=\n## |\s*$)/,`## Connected To\n\n${connected}\n`);
  }
  return `${body.trimEnd()}\n\n## Connected To\n\n${connected}\n`;
}
function stripGraphSection(body) {
  return body.replace(/\n## Graph Links\n\n[\s\S]*?(?=\n## |\s*$)/,'').trimEnd();
}
function graphLinksFromBody(body) {
  const m=body.match(/\n## Graph Links\n\n([\s\S]*?)(?=\n## |\s*$)/);
  if(!m) return [];
  return m[1].split('\n').map(s=>s.trim()).filter(Boolean);
}
function withGraphLinks(body,f,extraLinks=[]) {
  const links=[...new Set([...extraLinks,...graphLinksFor(f)])];
  const connectedBody=fillConnectedTo(body,f);
  if(!links.length) return connectedBody;
  return `${stripGraphSection(connectedBody)}\n\n## Graph Links\n\n${links.join('\n')}\n`;
}
function withCustomGraphLinks(body,links) {
  const clean=[...new Set(links.map(s=>s.trim()).filter(Boolean))];
  if(!clean.length) return stripGraphSection(body);
  return `${stripGraphSection(body)}\n\n## Graph Links\n\n${clean.join('\n')}\n`;
}
function connectedBlockFromLinks(links) {
  return [...new Set(links.map(s=>s.trim()).filter(Boolean))].map(link=>`- ${link}`).join('\n');
}
function fillConnectedToLinks(body,links) {
  const connected=connectedBlockFromLinks(links);
  if(!connected) return body;
  if(/## Connected To\n/.test(body)) {
    return body.replace(/## Connected To\n[\s\S]*?(?=\n## |\s*$)/,`## Connected To\n\n${connected}\n`);
  }
  return `${body.trimEnd()}\n\n## Connected To\n\n${connected}\n`;
}
function researchTypeLabel(key) {
  return ({accounts:'Accounts',daily:'Daily Topics',reels:'Reels',weekly:'Weekly',urgent:'Urgent'}[key])||key;
}
function parseBulkAccounts() {
  return document.getElementById('nf-account-bulk').value.split('\n').map(line=>line.trim()).filter(Boolean).map(line=>{
    const [name='',link='',accountFor='',format='']=line.split('|').map(part=>part.trim());
    return {name,link,accountFor,format};
  }).filter(item=>item.name);
}
function buildTemplate(title,account,format,status,priority,context,extra={}) {
  if(status==='research'&&modalResearchBucket==='accounts') {
    const accountFor=extra.account_for||selectedAccountFor().join(', ')||account;
    const link=extra.account_link||'';
    const accountFormat=extra.account_format||'';
    const links=[wiki(CONTENT_OS_HUB,'Content OS'),...String(accountFor).split(',').map(s=>s.trim()).filter(Boolean).map(brandBrainLink)].join('\n');
    const fm={node_type:'Note',summary:title,status,account_name:title,account_link:link,account_for:accountFor,...(accountFormat&&{account_format:accountFormat}),source:link||null};
    const body=`# ${title}\n\n## Account Link\n\n${link}\n\n## Useful For\n\n${accountFor}\n\n## Graph Links\n\n${links}\n\n## General Format\n\n${accountFormat||'General'}\n\n## Notes\n\n`;
    return writeFM(fm,body);
  }
  const noteLink=extra.note_link||extra.account_link||'';
  const noteBody=extra.note_body||context||'';
  const fm={node_type:'Note',summary:title,...(account&&{account}),...(format&&{format}),status,...(priority&&{priority}),film_date:null,post_date:null,source:noteLink||null,proof:null};
  let body;
  if(status==='research') body=`# ${title}\n\n## Link\n\n${noteLink}\n\n## Body\n\n${noteBody}\n\n## Account\n\n${accountLabel(account)}\n\n## Format\n\n${formatLabel(format)}\n\n## Connected To\n`;
  else if(format==='short-form'||format==='long-form') body=`# ${title}\n\n## Info\n\n- Published:\n- Performance:\n- Link: ${noteLink}\n- Source angle:\n\n## North Star\n\n${noteBody}\n\n## Hooks\n\n- **Text overlay (0:00):**\n- **Overlay 2 (last line):**\n\n## Script\n\n${context&&!extra.note_body?`<!-- Research context -->\n${context}\n\n`:'\n'}\n## Shot Notes\n\n\n\n## Connected To\n`;
  else if(format==='x') body=`# ${title}\n\n## Thread\n\n1. \n\n## Hook\n\n\n\n## Connected To\n`;
  else if(format==='carousel') body=`# ${title}\n\n## Slides\n\n1. **Cover:**\n2.\n3.\n\n## Caption\n\n\n\n## Connected To\n`;
  else if(format==='story') body=`# ${title}\n\n## Story Sequence\n\n1.\n2.\n3.\n\n## CTA\n\n\n\n## Connected To\n`;
  else body=`# ${title}\n\n## Idea\n\n\n\n## Why This Works\n\n\n\n## Source\n\n\n\n## Connected To\n`;
  const fake={account,format,status,rtype:status==='research'?modalResearchBucket:null};
  return writeFM(fm,withGraphLinks(body,fake));
}

async function createFile() {
  const title=document.getElementById('nf-title').value.trim();
  const account=document.getElementById('nf-account').value;
  const format=document.getElementById('nf-format').value;
  const status=modalStatusValue();
  const bucket=modalBucketValue();
  modalResearchBucket=bucket;
  const priority='';
  const noteLink=document.getElementById('nf-link').value.trim();
  const noteBody=document.getElementById('nf-body').value.trim();
  const accountLink=document.getElementById('nf-account-link').value.trim();
  const accountFor=selectedAccountFor().join(', ');
  const accountFormat=document.getElementById('nf-account-format').value;
  const bulkAccounts=parseBulkAccounts();
  if(!title&&!bulkAccounts.length){toast('Enter an account name or add accounts in bulk');return;}
  const slug=toSlug(title), filePath=buildFilePath(account,format,slug,status,bucket);
  const btn=document.getElementById('nf-submit');
  btn.disabled=true; btn.textContent='Creating...';
  try {
    if(status==='research'&&modalResearchBucket==='accounts'&&bulkAccounts.length){
      const created=[];
      for(const item of bulkAccounts){
        const itemSlug=toSlug(item.name);
        const itemPath=buildFilePath(account,format,itemSlug,status,'accounts');
        const itemContent=buildTemplate(item.name,account,item.format||format,status,priority,'',{account_link:item.link,account_for:item.accountFor||accountFor,account_format:item.format||accountFormat});
        const handle=await createFileAt(itemPath,itemContent);
        const {data,body}=parseFM(itemContent);
        const f=enrich({name:itemPath.split('/').pop(),path:itemPath,handle,data,body,content:itemContent});
        files.push(f); created.push(f);
      }
      updateCounts();
      closeModal(); toast(`Created ${created.length} accounts`);
      setView('research');
      if(created[0]) setTimeout(()=>selectCard(created[0].path),100);
      document.getElementById('nf-title').value='';
      document.getElementById('nf-link').value='';
      document.getElementById('nf-body').value='';
      document.getElementById('nf-account-link').value='';
      document.getElementById('nf-account-format').value='';
      document.getElementById('nf-account-bulk').value='';
      document.querySelectorAll('.nf-account-for').forEach(cb=>cb.checked=false);
      btn.disabled=false; btn.textContent='Create Account';
      return;
    }
    if(!title){toast('Enter a title first');return;}
    const content=buildTemplate(title,account,format,status,priority,noteBody,{note_link:noteLink,account_link:accountLink,account_for:accountFor,account_format:accountFormat,note_body:noteBody});
    const handle=await createFileAt(filePath,content);
    const {data,body}=parseFM(content);
    const f=enrich({name:filePath.split('/').pop(),path:filePath,handle,data,body,content});
    files.push(f);
    updateCounts();
    closeModal(); toast(`Created: ${title}`);
    if(status==='research') setView('research');
    else { setView('kanban'); renderKanban(); }
    setTimeout(()=>selectCard(f.path),100);
    document.getElementById('nf-title').value='';
    document.getElementById('nf-link').value='';
    document.getElementById('nf-body').value='';
    document.getElementById('nf-account-link').value='';
    document.getElementById('nf-account-format').value='';
    document.getElementById('nf-account-bulk').value='';
    document.querySelectorAll('.nf-account-for').forEach(cb=>cb.checked=false);
    btn.disabled=false; btn.textContent=status==='research'&&bucket==='accounts'?'Create Account':'Create File';
  } catch(e){ toast('Error: '+e.message,true); btn.disabled=false; btn.textContent=status==='research'&&bucket==='accounts'?'Create Account':'Create File'; }
}

function initFloatingEditor() {
  const editor=document.getElementById('insp');
  const head=editor?.querySelector('.insp-head');
  if(!editor||!head) return;
  let dragging=false, startX=0, startY=0, startLeft=0, startTop=0;
  head.addEventListener('mousedown',e=>{
    if(e.target.closest('button,input,select,textarea,a')) return;
    const rect=editor.getBoundingClientRect();
    dragging=true;
    startX=e.clientX;
    startY=e.clientY;
    startLeft=rect.left;
    startTop=rect.top;
    editor.style.transform='none';
    editor.style.left=`${startLeft}px`;
    editor.style.top=`${startTop}px`;
    document.body.style.userSelect='none';
    e.preventDefault();
  });
  window.addEventListener('mousemove',e=>{
    if(!dragging) return;
    const width=editor.offsetWidth;
    const height=editor.offsetHeight;
    const nextLeft=Math.max(0,Math.min(window.innerWidth-width,startLeft+e.clientX-startX));
    const nextTop=Math.max(0,Math.min(window.innerHeight-height,startTop+e.clientY-startY));
    editor.style.left=`${nextLeft}px`;
    editor.style.top=`${nextTop}px`;
  });
  window.addEventListener('mouseup',()=>{
    if(!dragging) return;
    dragging=false;
    document.body.style.userSelect='';
  });
  window.addEventListener('resize',()=>{
    if(editor.classList.contains('open')) keepFloatingEditorInBounds(editor);
  });
}

function keepFloatingEditorInBounds(editor) {
  const rect=editor.getBoundingClientRect();
  const nextWidth=Math.min(rect.width,window.innerWidth-20);
  const nextHeight=Math.min(rect.height,window.innerHeight-20);
  if(nextWidth>0&&nextWidth!==rect.width) editor.style.width=`${nextWidth}px`;
  if(nextHeight>0&&nextHeight!==rect.height) editor.style.height=`${nextHeight}px`;
  const nextRect=editor.getBoundingClientRect();
  const left=Math.max(0,Math.min(window.innerWidth-nextRect.width,nextRect.left));
  const top=Math.max(0,Math.min(window.innerHeight-nextRect.height,nextRect.top));
  editor.style.transform='none';
  editor.style.left=`${left}px`;
  editor.style.top=`${top}px`;
}

function initEditorResize() {
  const editor=document.getElementById('insp');
  if(!editor) return;
  let resizing=false, startX=0, startY=0, startW=0, startH=0, startLeft=0, startTop=0;
  editor.addEventListener('mousedown',e=>{
    const grip=e.target.closest('.editor-resize-grip');
    if(!grip) return;
    const rect=editor.getBoundingClientRect();
    resizing=true;
    startX=e.clientX;
    startY=e.clientY;
    startW=rect.width;
    startH=rect.height;
    startLeft=rect.left;
    startTop=rect.top;
    editor.style.transform='none';
    editor.style.left=`${startLeft}px`;
    editor.style.top=`${startTop}px`;
    document.body.style.userSelect='none';
    e.preventDefault();
    e.stopPropagation();
  });
  window.addEventListener('mousemove',e=>{
    if(!resizing) return;
    const maxW=window.innerWidth-startLeft-10;
    const maxH=window.innerHeight-startTop-10;
    const minW=Math.min(430,window.innerWidth-28);
    const minH=Math.min(360,window.innerHeight-28);
    const nextW=Math.max(minW,Math.min(maxW,startW+e.clientX-startX));
    const nextH=Math.max(minH,Math.min(maxH,startH+e.clientY-startY));
    editor.style.width=`${nextW}px`;
    editor.style.height=`${nextH}px`;
  });
  window.addEventListener('mouseup',()=>{
    if(!resizing) return;
    resizing=false;
    document.body.style.userSelect='';
    keepFloatingEditorInBounds(editor);
  });
}

// Drag-to-scroll
function initDragScroll(el) {
  let active=false, startX=0, startScroll=0;
  const SKIP='.card,.rcard,button,input,select,textarea,a';
  el.addEventListener('mousedown',e=>{
    if(e.target.closest(SKIP)) return;
    active=true; startX=e.pageX; startScroll=el.scrollLeft;
    el.style.cursor='grabbing'; el.style.userSelect='none';
    e.preventDefault();
  });
  const stop=()=>{ active=false; el.style.cursor=''; el.style.userSelect=''; };
  el.addEventListener('mouseup',stop);
  el.addEventListener('mouseleave',stop);
  el.addEventListener('mousemove',e=>{
    if(!active) return;
    el.scrollLeft=startScroll-(e.pageX-startX);
  });
}
document.addEventListener('DOMContentLoaded',()=>{
  initFloatingEditor();
  initEditorResize();
  initDragScroll(document.querySelector('.kanban-wrap'));
  document.querySelectorAll('.research-wrap').forEach(initDragScroll);
});

// Utils
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escA(s){ return String(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }
function escBody(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
let _tt;
function toast(msg,err=false){ const el=document.getElementById('toast'); el.textContent=msg; el.style.background=err?'#200000':'var(--bg3)'; el.classList.add('show'); clearTimeout(_tt); _tt=setTimeout(()=>el.classList.remove('show'),2600); }
</script>

<style>
#rb-corner{
  position:fixed; left:8px; bottom:38px; width:24px; height:24px; z-index:100000;
  display:grid; place-items:center; cursor:pointer; background:transparent; border:none;

#rb-overlay{
  position:fixed; inset:0; z-index:100001; display:flex; align-items:center; justify-content:center;
  background:rgba(8,14,13,.5); -webkit-backdrop-filter:blur(8px); backdrop-filter:blur(8px);
  opacity:0; pointer-events:none; transition:opacity .16s ease;
}
#rb-overlay.open{ opacity:1; pointer-events:auto; }
.rb-card{
  width:320px; max-width:90vw; background:var(--bg1); border:1px solid var(--border);
  border-radius:var(--r,8px); box-shadow:var(--panel-shadow,0 22px 48px rgba(0,0,0,.38));
  padding:14px; transform:translateY(8px) scale(.98); transition:transform .16s ease;
}
#rb-overlay.open .rb-card{ transform:none; }
.rb-card-title{
  font-size:11px; font-weight:800; letter-spacing:.08em; text-transform:uppercase;
  color:var(--text3); margin:2px 6px 10px;
}
.rb-app{
  display:flex; align-items:center; gap:10px; padding:10px; border-radius:7px; cursor:pointer;
  color:var(--text1); border:1px solid transparent; user-select:none;
}
.rb-app:hover{ background:var(--bg3); }
.rb-app.active{ background:var(--bg3); border-color:var(--border2); }
.rb-app .rb-dot{ width:8px; height:8px; border-radius:50%; background:var(--accent); flex:none; }
.rb-app .rb-name{ font-size:14px; font-weight:600; flex:1; }
.rb-app .rb-handle{ color:var(--text3); cursor:grab; opacity:0; font-size:13px; letter-spacing:-2px; }
.rb-app:hover .rb-handle{ opacity:.7; }
.rb-app.pinned .rb-handle{ visibility:hidden; }
.rb-app.dragging{ opacity:.45; }
.rb-app.drop-target{ box-shadow:inset 0 2px 0 var(--accent); }

#rb-frame{
  position:fixed; inset:0; z-index:90000; width:100%; height:100%; border:0;
  background:#0e1014; display:none;
}
#rb-frame.show{ display:block; }
</style>

<button id="rb-corner" title="Apps" aria-label="Open app launcher">
  <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="5" cy="5" r="2"/><circle cx="12" cy="5" r="2"/><circle cx="19" cy="5" r="2"/><circle cx="5" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="19" cy="12" r="2"/><circle cx="5" cy="19" r="2"/><circle cx="12" cy="19" r="2"/><circle cx="19" cy="19" r="2"/></svg>
</button>
<div id="rb-overlay"><div class="rb-card">
  <div class="rb-card-title">Apps</div>
  <div id="rb-app-list"></div>
</div></div>
<iframe id="rb-frame" title="Readback" src="about:blank" allow="autoplay"></iframe>

<script>
(function(){
  var ORDER_KEY='hub:appOrder';
  // The default "Content" app is ContentOS itself (pinned, not draggable).
  // Add future apps to APPS + DRAGGABLE and they appear in the launcher.
  var APPS={
    content:{ name:'Content', url:null, pinned:true },
    readback:{ name:'Readback', url:'http://localhost:5050' },
    linkscribe:{ name:'LinkScribe', url:'https://linkscribe.vercel.app' },
    poster:{ name:'Poster', url:'https://contentos-flame.vercel.app/?desktop=1', top:true },
    dmsender:{ name:'Dmsender', url:'https://triggerdm.vercel.app/?desktop=1', top:true }
  };
  var DRAGGABLE=['readback','linkscribe','poster','dmsender'];
  var corner=document.getElementById('rb-corner');
  var overlay=document.getElementById('rb-overlay');
  var listEl=document.getElementById('rb-app-list');
  var frame=document.getElementById('rb-frame');
  var current='content';
  var dragId=null;

  function loadOrder(){
    var saved=[]; try{ saved=JSON.parse(localStorage.getItem(ORDER_KEY)||'[]'); }catch(e){}
    var order=saved.filter(function(id){ return DRAGGABLE.indexOf(id)>=0; });
    DRAGGABLE.forEach(function(id){ if(order.indexOf(id)<0) order.push(id); });
    return order;
  }
  function saveOrder(order){ try{ localStorage.setItem(ORDER_KEY, JSON.stringify(order)); }catch(e){} }

  function switchApp(id){
    var app=APPS[id];
    // "top" apps (e.g. the Poster) load as a full-page navigation in the app's
    // webview — NOT inside an iframe. OAuth providers refuse to load framed, so
    // login must happen as a top-level page; this is the only in-app way it can
    // work. The page itself shows a "back to Content OS" control.
    if(app && app.top && app.url){
      window.location.href=app.url;
      return;
    }
    // External apps open in the real browser (Chrome) via the local server.
    if(app && app.external && app.url){
      fetch('/open?url='+encodeURIComponent(app.url)).catch(function(){ window.open(app.url,'_blank'); });
      return;
    }
    current=id;
    if(app && app.url){
      // Single shared iframe: only (re)load when switching to a different app.
      if(frame.getAttribute('data-app')!==id){ frame.src=app.url; frame.setAttribute('data-app',id); }
      frame.classList.add('show');
    } else {
      frame.classList.remove('show');   // "Content" (no url) → back to ContentOS
    }
  }

  function makeDraggable(row){
    row.draggable=true;
    row.addEventListener('dragstart',function(){ dragId=row.dataset.id; row.classList.add('dragging'); });
    row.addEventListener('dragend',function(){ row.classList.remove('dragging'); Array.prototype.forEach.call(listEl.querySelectorAll('.rb-app'),function(r){ r.classList.remove('drop-target'); }); });
    row.addEventListener('dragover',function(e){ e.preventDefault(); if(row.dataset.id!=='content') row.classList.add('drop-target'); });
    row.addEventListener('dragleave',function(){ row.classList.remove('drop-target'); });
    row.addEventListener('drop',function(e){
      e.preventDefault(); row.classList.remove('drop-target');
      var targetId=row.dataset.id;
      if(!dragId || dragId===targetId || targetId==='content') return;
      var order=loadOrder();
      order.splice(order.indexOf(dragId),1);
      order.splice(order.indexOf(targetId),0,dragId);
      saveOrder(order); render();
    });
  }

  function render(){
    listEl.innerHTML='';
    var items=[['content',APPS.content]];
    loadOrder().forEach(function(id){ items.push([id,APPS[id]]); });
    items.forEach(function(pair){
      var id=pair[0], app=pair[1];
      var row=document.createElement('div');
      row.className='rb-app'+(app.pinned?' pinned':'')+(current===id?' active':'');
      row.dataset.id=id;
      var dot=document.createElement('span'); dot.className='rb-dot';
      var name=document.createElement('span'); name.className='rb-name'; name.textContent=app.name;
      var handle=document.createElement('span'); handle.className='rb-handle'; handle.textContent='⋮⋮';
      row.appendChild(dot); row.appendChild(name); row.appendChild(handle);
      row.addEventListener('click',function(){ switchApp(id); closeLauncher(); });
      if(!app.pinned) makeDraggable(row);
      listEl.appendChild(row);
    });
  }

  function openLauncher(){ render(); overlay.classList.add('open'); }
  function closeLauncher(){ overlay.classList.remove('open'); }

  corner.addEventListener('click',function(){ overlay.classList.contains('open')?closeLauncher():openLauncher(); });
  overlay.addEventListener('click',function(e){ if(e.target===overlay) closeLauncher(); });
  document.addEventListener('keydown',function(e){ if(e.key==='Escape') closeLauncher(); });
})();
</script>
